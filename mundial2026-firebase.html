<style>
  /* Safe area for notch phones - iOS fix */
  :root {
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --nav: 64px;
  }
  #app {
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .navbar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    height: calc(64px + env(safe-area-inset-bottom, 0px));
    padding-bottom: env(safe-area-inset-bottom, 0px);
    background: #fff;
    border-top: 1px solid #e8ede9;
    display: flex;
    box-shadow: 0 -3px 16px rgba(0,0,0,.07);
    z-index: 1000;
  }
  .content {
    padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px) + 20px);
  }
  .hdr {
    padding-top: calc(14px + env(safe-area-inset-top, 0px));
    min-height: calc(56px + env(safe-area-inset-top, 0px));
  }
  #app {
    padding-top: 0;
  }
  .fab {
    position: fixed;
    bottom: calc(64px + env(safe-area-inset-bottom, 0px) + 14px);
    right: max(14px, calc((100vw - 480px) / 2 + 14px));
    z-index: 999;
  }
  .donate-banner {
    position: fixed;
    bottom: calc(64px + env(safe-area-inset-bottom, 0px) + 12px);
    left: max(12px, calc((100vw - 480px) / 2 + 12px));
    right: max(12px, calc((100vw - 480px) / 2 + 12px));
    z-index: 998;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a6b3a;--green-l:#2a8a4e;--green-d:#0f4024;
  --gold:#f5c518;--gold-d:#c9a500;
  --bg:#f0f4f1;--card:#fff;--gray:#8a9a8e;--gray-l:#e8ede9;
  --red:#e03535;--text:#1a2b1f;--muted:#5a7060;--nav:64px;--r:14px;
}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#app{max-width:480px;margin:0 auto;height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.15)}

/* LOGIN SCREEN */
.login-screen{flex:1;background:linear-gradient(160deg,var(--green-d) 0%,var(--green) 55%,#2ecc71 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;padding-bottom:calc(32px + env(safe-area-inset-bottom,0px));text-align:center;color:#fff;overflow-y:auto}
.login-trophy{font-size:72px;margin-bottom:14px;filter:drop-shadow(0 8px 20px rgba(0,0,0,.3))}
.login-title{font-family:'Anton',sans-serif;font-size:36px;letter-spacing:2px;line-height:1;margin-bottom:6px}
.login-sub{font-size:14px;opacity:.85;margin-bottom:32px;font-weight:600}
.login-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.social-btn{display:flex;align-items:center;gap:12px;background:#fff;color:#1a1a1a;border:none;border-radius:12px;padding:14px 18px;font-family:'Barlow',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;width:100%}
.social-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.15)}
.social-btn:active{transform:scale(.98)}
.social-btn .s-icon{width:24px;height:24px;flex-shrink:0}
.social-btn.google{background:#fff}
.social-btn.facebook{background:#1877f2;color:#fff}
.social-btn.apple{background:#000;color:#fff}
.social-btn.email{background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.3)}
.divider-line{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.5);font-size:12px;font-weight:600;margin:4px 0;width:100%;max-width:320px}
.divider-line::before,.divider-line::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.25)}

/* EMAIL FORM */
.email-form{background:#fff;border-radius:20px 20px 0 0;position:absolute;bottom:0;left:0;right:0;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));z-index:100;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.email-form-title{font-family:'Anton',sans-serif;font-size:20px;color:var(--green);margin-bottom:16px;text-align:center}
.form-group{margin-bottom:12px}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:5px;display:block}
.form-input{width:100%;border:1.5px solid var(--gray-l);border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;background:var(--bg);transition:border-color .2s}
.form-input:focus{border-color:var(--green);background:#fff}
.btn{border:none;border-radius:10px;padding:12px 18px;font-family:inherit;font-weight:700;cursor:pointer;font-size:14px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;min-height:44px;width:100%}
.btn-primary{background:var(--green);color:#fff}
.btn-secondary{background:var(--gray-l);color:var(--text)}
.btn-gold{background:var(--gold);color:var(--green-d)}
.btn-sm{padding:7px 11px;font-size:12px;min-height:36px;width:auto}
.btn-danger{background:#fde8e8;color:var(--red)}
.toggle-link{text-align:center;font-size:13px;color:var(--muted);margin-top:10px;cursor:pointer}
.toggle-link span{color:var(--green);font-weight:700}

/* PROFILE SETUP */
.profile-setup{flex:1;overflow-y:auto;background:var(--bg)}
.setup-hdr{background:var(--green);padding:14px 16px;color:#fff;display:flex;align-items:center;gap:8px}
.setup-title{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:1px}
.avatar-picker{display:flex;gap:8px;flex-wrap:wrap}
.av-opt{font-size:26px;cursor:pointer;padding:6px;border-radius:8px;border:2px solid transparent;transition:all .2s}
.av-opt.sel{border-color:var(--green);background:#e8f5ee}

/* APP SHELL */
.app-shell{flex:1;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:var(--green);color:#fff;padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-t{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:1px}
.hdr-s{font-size:10px;opacity:.75;font-weight:600}
.hdr-user{background:rgba(255,255,255,.15);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}
.content{flex:1;overflow-y:auto;overflow-x:hidden}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:var(--gray-l);border-radius:3px}
/* navbar styles now handled by safe-area style block above */
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;color:var(--gray);border:none;background:none;font-family:inherit;min-height:44px;transition:color .2s}
.ni.act{color:var(--green)}
.ni .ico{font-size:20px;transition:transform .2s}
.ni.act .ico{transform:scale(1.15)}
.ni .lbl{font-size:8px;font-weight:700;letter-spacing:0px;text-transform:uppercase;white-space:nowrap}

/* ALBUM */
.album-hdr{background:var(--green);padding:14px}
.prog-bar{background:rgba(255,255,255,.25);border-radius:100px;height:9px;overflow:hidden}
.prog-fill{background:linear-gradient(90deg,var(--gold),#fff);height:100%;border-radius:100px;transition:width .5s}
.filter-row{display:flex;gap:5px;overflow-x:auto;padding:10px 14px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.chip{background:#fff;border:1.5px solid var(--gray-l);border-radius:100px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;color:var(--muted);font-family:inherit}
.chip.act{background:var(--green);border-color:var(--green);color:#fff}
.search-box{margin:0 14px 7px;background:#fff;border-radius:9px;border:1.5px solid var(--gray-l);display:flex;align-items:center;padding:0 11px}
.search-box input{flex:1;border:none;outline:none;padding:9px 7px;font-size:13px;font-family:inherit;background:transparent}
.sec-hdr{display:flex;align-items:center;gap:7px;padding:9px 14px;background:var(--green-d);color:#fff;cursor:pointer;user-select:none}
.sec-name{font-family:'Anton',sans-serif;font-size:13px;letter-spacing:.5px;flex:1}
.sec-chev{font-size:11px;transition:transform .3s}
.sec-chev.open{transform:rotate(180deg)}
.sticker-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:10px;background:#fff}
.stk{aspect-ratio:2/3;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s;position:relative;border:2px solid transparent;user-select:none;min-height:44px}
.stk:active{transform:scale(.92)}
.stk.miss{background:var(--gray-l);border:2px dashed #c5d0c7}
.stk.have{background:linear-gradient(135deg,#e8f5ee,#d0eddb);border-color:var(--green)}
.stk.dbl{background:linear-gradient(135deg,#fff8e0,#ffeaa0);border-color:var(--gold-d)}
.stk-n{font-family:'Anton',sans-serif;font-size:12px;color:var(--muted)}
.stk.have .stk-n,.stk.have .stk-ico{color:var(--green-d)}
.stk.dbl .stk-n,.stk.dbl .stk-ico{color:var(--gold-d)}
.stk-ico{font-size:13px}
.stk-c{font-size:8px;font-weight:700;background:var(--gold);color:var(--green-d);border-radius:100px;padding:1px 4px;position:absolute;top:2px;right:2px}
@keyframes pop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .22s ease forwards}

/* POSTS */
.post-card{background:#fff;border-radius:var(--r);margin:7px 14px;padding:13px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--gray-l);flex-shrink:0;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.pills{display:flex;flex-wrap:wrap;gap:3px}
.pill{background:var(--gray-l);border-radius:5px;padding:2px 6px;font-size:10px;font-weight:700;color:var(--muted)}
.pill.off{background:#e8f5ee;color:var(--green-d)}
.pill.wnt{background:#fff3cd;color:#856404}
.stars{display:inline-flex;gap:2px}
.star{font-size:11px;color:var(--gray-l)}
.star.f{color:var(--gold)}

/* MATCHES */
.match-card{background:#fff;border-radius:var(--r);margin:7px 14px;padding:13px;box-shadow:0 2px 10px rgba(0,0,0,.08);position:relative;overflow:hidden}
.match-card.perf::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--green))}
.m-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,var(--gold),#f7d060);color:var(--green-d);border-radius:100px;padding:3px 9px;font-size:10px;font-weight:700;margin-bottom:7px}
.m-nums{display:flex;gap:10px;margin:9px 0}
.m-box{flex:1;background:var(--bg);border-radius:9px;padding:9px;text-align:center}
.m-num{font-family:'Anton',sans-serif;font-size:26px}
.m-num.g{color:var(--green)}
.m-num.au{color:var(--gold-d)}

/* CHAT */
.chat-item{display:flex;align-items:center;gap:11px;padding:11px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--gray-l)}
.chat-item:hover{background:var(--bg)}
.chat-view{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;z-index:50}
.cv-hdr{display:flex;align-items:center;gap:9px;padding:11px 14px;background:#fff;border-bottom:1px solid var(--gray-l);flex-shrink:0}
.cv-msgs{flex:1;overflow-y:auto;padding:11px 14px;display:flex;flex-direction:column;gap:7px}
.bubble{max-width:78%;padding:9px 13px;border-radius:13px;font-size:12px;line-height:1.4}
.bubble.mine{background:var(--green);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.bubble.theirs{background:#fff;color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.prop-bubble{background:#fff;border-radius:13px;padding:11px;box-shadow:0 1px 8px rgba(0,0,0,.1);max-width:83%;border:2px solid var(--green)}
.prop-title{font-weight:700;font-size:12px;color:var(--green);margin-bottom:7px}
.prop-row{display:flex;gap:7px;margin-bottom:7px}
.prop-col{flex:1;background:var(--bg);border-radius:7px;padding:7px}
.pstatus{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700}
.s-pend{background:#fff3cd;color:#856404}
.s-acc{background:#e8f5ee;color:var(--green-d)}
.s-comp{background:var(--green);color:#fff}
.s-rej{background:#fde8e8;color:var(--red)}
.cv-inp{display:flex;gap:7px;padding:9px 14px;padding-bottom:calc(9px + env(safe-area-inset-bottom,0px));background:#fff;border-top:1px solid var(--gray-l);flex-shrink:0}
.c-input{flex:1;border:1.5px solid var(--gray-l);border-radius:22px;padding:9px 14px;font-size:13px;font-family:inherit;outline:none}
.c-input:focus{border-color:var(--green)}
.send-btn{background:var(--green);color:#fff;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prop-btn{background:var(--gold);color:var(--green-d);border:none;border-radius:9px;padding:7px 12px;font-family:inherit;font-weight:700;font-size:11px;cursor:pointer}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;max-width:480px;left:50%;transform:translateX(-50%)}
.modal{background:#fff;border-radius:18px 18px 0 0;width:100%;max-height:85%;display:flex;flex-direction:column;animation:slideUp .3s ease;padding-bottom:env(safe-area-inset-bottom,0px)}
.modal-handle{width:36px;height:4px;background:var(--gray-l);border-radius:100px;margin:10px auto 0}
.modal-hdr{padding:14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-l)}
.modal-title{font-family:'Anton',sans-serif;font-size:17px;color:var(--green)}
.modal-close{background:var(--gray-l);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:15px}
.modal-body{padding:14px;overflow-y:auto;flex:1}
.modal-ft{padding:14px;padding-bottom:calc(14px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--gray-l);display:flex;gap:7px}

/* PROFILE */
.prof-hero{background:linear-gradient(135deg,var(--green-d),var(--green));color:#fff;padding:22px 18px;text-align:center}
.badge-row{display:flex;flex-wrap:wrap;gap:7px;padding:14px}
.badge{background:var(--bg);border-radius:9px;padding:7px 11px;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--muted)}
.badge.earned{background:linear-gradient(135deg,#fff8e0,#ffeaa0);color:var(--green-d)}

/* TOAST */
.toast-c{position:fixed;top:calc(75px + env(safe-area-inset-top,0px));left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;gap:6px;pointer-events:none;width:88%;max-width:420px}
.toast{background:var(--green-d);color:#fff;border-radius:9px;padding:10px 14px;font-size:12px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:toastIn .3s ease}
@keyframes toastIn{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.gold{background:var(--gold);color:var(--green-d)}
.toast.err{background:var(--red)}

.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty .ei{font-size:48px;margin-bottom:10px}
.fab{position:absolute;right:14px;width:50px;height:50px;border-radius:50%;background:var(--gold);color:var(--green-d);border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;z-index:10;transition:transform .2s}
.fab:hover{transform:scale(1.08)}
.loading-screen{flex:1;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--green-d),var(--green));color:#fff;font-family:'Anton',sans-serif;font-size:32px;flex-direction:column;gap:16px}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.rating-star{font-size:26px;cursor:pointer;color:var(--gray-l)}
.plabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}

/* GROUPS */
.group-card{background:#fff;border-radius:var(--r);margin:7px 14px;padding:13px;box-shadow:0 2px 10px rgba(0,0,0,.08);cursor:pointer;transition:transform .15s}
.group-card:active{transform:scale(.98)}
.group-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--green-d),var(--green));display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.group-name{font-weight:700;font-size:14px;margin-bottom:2px}
.group-desc{font-size:11px;color:var(--muted);line-height:1.4}
.group-meta{display:flex;gap:10px;margin-top:7px;font-size:10px;color:var(--muted);font-weight:700}
.group-meta span{display:flex;align-items:center;gap:3px}
.group-view{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;z-index:50}
.group-hdr{background:var(--green);padding:13px 14px;color:#fff;display:flex;align-items:center;gap:10px;flex-shrink:0}
.group-tabs{display:flex;background:#fff;border-bottom:1px solid var(--gray-l);flex-shrink:0}
.gtab{flex:1;padding:11px 4px;text-align:center;font-size:10px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);border:none;background:none;font-family:inherit;transition:all .2s}
.gtab.act{color:var(--green);border-bottom:2px solid var(--green)}
.group-content{flex:1;overflow-y:auto}
.member-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--gray-l);background:#fff}
.rank-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:13px;flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#f5c518,#f7d060);color:var(--green-d)}
.rank-2{background:linear-gradient(135deg,#c0c0c0,#e0e0e0);color:#444}
.rank-3{background:linear-gradient(135deg,#cd7f32,#e8a060);color:#fff}
.rank-n{background:var(--gray-l);color:var(--muted)}
.emoji-picker{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0}
.emoji-opt{font-size:28px;cursor:pointer;padding:6px;border-radius:8px;border:2px solid transparent;transition:all .15s;line-height:1}
.emoji-opt.sel{border-color:var(--green);background:#e8f5ee}
.join-badge{display:inline-flex;align-items:center;gap:4px;border-radius:100px;padding:3px 10px;font-size:10px;font-weight:700}
.join-pending{background:#fff3cd;color:#856404}
.join-member{background:#e8f5ee;color:var(--green-d)}
.join-admin{background:var(--green);color:#fff}

/* ONBOARDING */
.ob-screen{position:absolute;inset:0;background:#fff;z-index:200;display:flex;flex-direction:column;overflow:hidden;padding-top:env(safe-area-inset-top,0px)}
.ob-hdr{background:var(--green);padding:14px 16px;color:#fff;flex-shrink:0}
.ob-title{font-family:'Anton',sans-serif;font-size:16px;letter-spacing:1px}
.ob-sub{font-size:11px;opacity:.75;margin-top:2px}
.ob-prog{display:flex;gap:4px;padding:10px 16px;background:var(--green);flex-shrink:0}
.ob-step-dot{flex:1;height:4px;border-radius:100px;background:rgba(255,255,255,.3);transition:background .3s}
.ob-step-dot.done{background:#fff}
.ob-body{flex:1;overflow-y:auto;padding:14px}
.ob-footer{padding:14px;padding-bottom:calc(14px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--gray-l);display:flex;gap:8px;flex-shrink:0;background:#fff}
.ob-sec-card{background:#fff;border-radius:var(--r);margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.08);overflow:hidden}
.ob-sec-hdr{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;background:var(--green-d);color:#fff}
.ob-sec-body{padding:10px}
.ob-stk-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.ob-stk{aspect-ratio:2/3;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:2px solid transparent;user-select:none;min-height:44px;background:var(--gray-l);border:2px dashed #c5d0c7;transition:all .15s;position:relative}
.ob-stk.have{background:linear-gradient(135deg,#e8f5ee,#d0eddb);border-color:var(--green)}
.ob-stk-n{font-family:'Anton',sans-serif;font-size:10px;color:var(--muted)}
.ob-stk.have .ob-stk-n{color:var(--green-d)}
.ob-stk-ico{font-size:12px}
.ob-count-row{display:flex;align-items:center;gap:6px;margin-top:6px;padding:6px 8px;background:var(--bg);border-radius:8px}
.ob-count-lbl{font-size:11px;color:var(--muted);flex:1}
.ob-count-btns{display:flex;gap:4px}
.ob-count-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--gray-l);background:#fff;font-family:'Anton',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s}
.ob-count-btn.sel{background:var(--gold);border-color:var(--gold-d);color:var(--green-d)}
.ob-summary-card{background:#fff;border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.08);text-align:center}
.ob-big-num{font-family:'Anton',sans-serif;font-size:48px;color:var(--green);line-height:1}
.ob-num-row{display:flex;gap:10px;margin-top:12px}
.ob-num-box{flex:1;background:var(--bg);border-radius:10px;padding:10px;text-align:center}
.ob-num{font-family:'Anton',sans-serif;font-size:22px}

/* DONATION BANNER */
.donate-banner{position:absolute;left:12px;right:12px;z-index:90;
  background:linear-gradient(135deg,#1a3a6b,#1a5fa8);
  border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
  animation:bannerIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes bannerIn{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.donate-banner .d-icon{font-size:28px;flex-shrink:0}
.donate-banner .d-text{flex:1}
.donate-banner .d-title{font-weight:700;font-size:13px;color:#fff;line-height:1.3}
.donate-banner .d-sub{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px}
.donate-banner .d-btn{background:#f5c518;color:#1a3a6b;border:none;border-radius:8px;
  padding:8px 12px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;
  white-space:nowrap;flex-shrink:0;transition:transform .15s}
.donate-banner .d-btn:active{transform:scale(.96)}
.donate-banner .d-close{background:rgba(255,255,255,.15);border:none;color:#fff;
  width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
</style>

function genCode(){return 'COL-'+Math.floor(1000+Math.random()*9000);}

function nowTs(){return Date.now();}
function formatJoinDate(joinedAt){
  try{
    let d;
    if(!joinedAt)return'hoy';
    if(typeof joinedAt.toDate==='function')d=joinedAt.toDate();
    else if(joinedAt.seconds&&joinedAt.nanoseconds!==undefined)d=new Date(joinedAt.seconds*1000);
    else if(typeof joinedAt==='number'&&joinedAt>1000000000000)d=new Date(joinedAt);
    else if(typeof joinedAt==='number'&&joinedAt>1000000000)d=new Date(joinedAt*1000);
    else d=new Date(joinedAt);
    if(!d||isNaN(d.getTime()))return'hoy';
    const months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    return`${months[d.getMonth()]} ${d.getFullYear()}`;
  }catch(e){return'hoy';}
}
function getTerm(cap=false){
  const t=userProfile?.term||'lámina';
  return cap?t.charAt(0).toUpperCase()+t.slice(1):t;

function getTermPlural(cap=false){
  const t=userProfile?.term||'lámina';
  const p=t==='lámina'?'láminas':t==='figurita'?'figuritas':t==='cromo'?'cromos':t==='estampa'?'estampas':t==='calcomania'?'calcomanías':'pegatinas';
  return cap?p.charAt(0).toUpperCase()+p.slice(1):p;
}
function timeAgo(ts){
  const d=(nowTs()-ts)/1000;
  if(d<60)return'hace un momento';
  if(d<3600)return`hace ${Math.floor(d/60)} min`;
  if(d<86400)return`hace ${Math.floor(d/3600)} h`;
  return`hace ${Math.floor(d/86400)} d`;
}
function getAllStickers(){
  const all=[];
  SECTIONS.forEach(sec=>{for(let i=1;i<=sec.count;i++)all.push(sec.prefix+i);});
  return all;
}
function getAlbumStats(album={}){
  let have=0,doubles=0,missing=0;
  getAllStickers().forEach(id=>{const s=album[id];if(!s||s.state==='missing')missing++;else if(s.state==='have')have++;else{have++;doubles++;}});
  return{have,doubles,missing};
}
function getUserRating(u){if(!u?.ratings?.length)return 0;return u.ratings.reduce((a,b)=>a+b,0)/u.ratings.length;}

  const r=Math.round(rating);
  let h='<span class="stars">';
  for(let i=1;i<=5;i++)h+=`<span class="star ${i<=r?'f':''}">★</span>`;
  h+='</span>';
  if(count!==undefined)h+=`<span style="font-size:10px;color:var(--muted);margin-left:2px">(${count})</span>`;
  return h;
}
function getDoublesList(album={}){return Object.entries(album).filter(([,v])=>v.state==='double').map(([k])=>k);}
function getMissingList(album={}){return getAllStickers().filter(id=>!album[id]||album[id].state==='missing');}
function pillsHtml(ids=[],cls,max=14){
  if(!ids.length)return'<span style="font-size:11px;color:var(--muted)">—</span>';
  let h=ids.slice(0,max).map(id=>`<span class="pill ${cls}">${id}</span>`).join('');
  if(ids.length>max)h+=`<span class="pill">+${ids.length-max}</span>`;
  return`<div class="pills">${h}</div>`;
}

async function saveAlbum(album){
  if(!currentUser)return;

async function loadAllUsers(){
  const snap=await getDocs(collection(db,'users'));
  allUsers=snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function loadPosts(){
  const snap=await getDocs(query(collection(db,'posts'),orderBy('createdAt','desc')));
  posts=snap.docs.map(d=>({id:d.id,...d.data(),createdAt:d.data().createdAt?.toMillis?.()??nowTs()}));
}
async function loadConversations(){
  if(!currentUser)return;
  const snap=await getDocs(query(collection(db,'conversations'),where('participants','array-contains',currentUser.uid)));
  conversations=snap.docs.map(d=>({id:d.id,...d.data(),updatedAt:d.data().updatedAt?.toMillis?.()??nowTs()}));
}

onAuthStateChanged(auth,async user=>{
  if(user){
    currentUser=user;
    const ref=doc(db,'users',user.uid);
    const snap=await getDoc(ref);
    if(!snap.exists()){
      // Nuevo usuario → setup de perfil
      showSetup();
    } else {
      userProfile={id:user.uid,...snap.data()};
      await loadAllUsers();await loadPosts();await loadConversations();
      showApp();
    }
  } else {
    currentUser=null;userProfile=null;
    hide('scr-loading');
    show('scr-login');
    document.getElementById('scr-login').style.flexDirection='column';
  }
});

// ONBOARDING FLOW
// ============================================================
let obAlbum = {}; // temp album during onboarding
let obCurrentSec = 0;
let obOpenSecs = {};

function shouldShowOnboarding(){
  // Show if user has no stickers marked at all
  const album = userProfile?.album || {};
  const hasAny = Object.values(album).some(v=>v.state==='have'||v.state==='double');
  return !hasAny;
}

function startOnboarding(force=false){
  const hasAlbum=Object.values(userProfile?.album||{}).some(v=>v.state==='have'||v.state==='double');
  if(hasAlbum&&!force){
    if(!confirm('Ya tenés láminas marcadas. ¿Querés revisar y actualizar tu álbum?'))return;
  }
  obAlbum = {...(userProfile?.album||{})};
  obCurrentSec = 0;
  obOpenSecs = {};
  const ov = document.getElementById('onboarding-overlay');
  ov.style.display = 'block';
  renderOnboarding();
}

function renderOnboarding(){
  const ov = document.getElementById('onboarding-overlay');
  const totalSecs = SECTIONS.length;
  const sec = SECTIONS[obCurrentSec];
  const isLast = obCurrentSec === totalSecs - 1;
  const isSummary = obCurrentSec >= totalSecs;

  if(isSummary){
    renderOnboardingSummary();
    return;
  }

  // Count stickers for this section
  const stkIds = Array.from({length:sec.count},(_,i)=>sec.prefix+(i+1));
  const haveIds = stkIds.filter(id=>obAlbum[id]&&obAlbum[id].state!=='missing');

  let stkHtml = '';
  stkIds.forEach(id=>{
    const st = obAlbum[id];
    const state = st?.state||'missing';
    const count = st?.count||1;
    const isHave = state!=='missing';
    stkHtml += `<div class="ob-stk ${isHave?'have':''}" data-id="${id}" onclick="obToggleStk('${id}')">
      <span class="ob-stk-n">${id}</span>
      ${isHave?'<span class="ob-stk-ico">✓</span>':''}
    </div>`;
  });

  // Repeated stickers section
  let repHtml = '';
  haveIds.forEach(id=>{
    const count = obAlbum[id]?.count||1;
    repHtml += `<div class="ob-count-row">
      <span class="ob-count-lbl">${id}</span>
      <div class="ob-count-btns">
        ${[1,2,3,4].map(n=>`<button class="ob-count-btn ${count===n?'sel':''}" onclick="obSetCount('${id}',${n})">×${n}</button>`).join('')}
        <button class="ob-count-btn ${count>=5?'sel':''}" onclick="obSetCount('${id}',5)">+5</button>
      </div>
    </div>`;
  });

  ov.innerHTML = `<div class="ob-screen">
    <div class="ob-hdr">
      <div class="ob-title">${sec.flag} ${sec.name}</div>
      <div class="ob-sub">Sección ${obCurrentSec+1} de ${totalSecs} · ${Math.round((obCurrentSec/totalSecs)*100)}% completado</div>
    </div>
    <div class="ob-prog">
      ${SECTIONS.map((_,i)=>`<div class="ob-step-dot ${i<=obCurrentSec?'done':''}"></div>`).join('')}
    </div>
    <div class="ob-body">
      <div style="background:#fff;border-radius:var(--r);padding:12px;margin-bottom:10px;box-shadow:0 1px 8px rgba(0,0,0,.07)">
        <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px">MARCÁ LAS QUE TENÉS (${haveIds.length}/${sec.count})</div>
        <div class="ob-stk-grid">${stkHtml}</div>
        <div style="display:flex;gap:7px;margin-top:10px">
          <button class="btn btn-secondary btn-sm" style="flex:1" onclick="obMarkAll('${sec.id}',true)">✓ Marcar todas</button>
          <button class="btn btn-secondary btn-sm" style="flex:1" onclick="obMarkAll('${sec.id}',false)">✕ Ninguna</button>
        </div>
      </div>
      ${haveIds.length>0?`
      <div style="background:#fff;border-radius:var(--r);padding:12px;box-shadow:0 1px 8px rgba(0,0,0,.07)">
        <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px">¿TENÉS REPETIDAS?</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px">×1 = solo una · ×2 = una repetida · ×3 = dos repetidas</div>
        ${repHtml}
      </div>`:''}
    </div>
    <div class="ob-footer">
      ${obCurrentSec>0?`<button class="btn btn-secondary" style="flex:1" onclick="obPrev()">← Anterior</button>`:'<button class="btn btn-secondary" style="flex:1" onclick="obSkip()">Saltar todo</button>'}
      <button class="btn btn-primary" style="flex:1" onclick="obNext()">${isLast?'Ver resumen →':'Siguiente →'}</button>
    </div>
  </div>`;
}

function renderOnboardingSummary(){
  const ov = document.getElementById('onboarding-overlay');
  const all = getAllStickers();
  let have=0,doubles=0,missing=0;
  all.forEach(id=>{
    const s=obAlbum[id];
    if(!s||s.state==='missing')missing++;
    else if(s.state==='have')have++;
    else{have++;doubles++;}
  });
  const pct=Math.round(have/TOTAL_STICKERS*100);

  ov.innerHTML=`<div class="ob-screen">
    <div class="ob-hdr">
      <div class="ob-title">🏆 ¡RESUMEN DE TU ÁLBUM!</div>
      <div class="ob-sub">Todo registrado correctamente</div>
    </div>
    <div class="ob-body" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
      <div class="ob-summary-card" style="width:100%">
        <div style="font-size:13px;color:var(--muted);margin-bottom:4px">Tu álbum está</div>
        <div class="ob-big-num">${pct}%</div>
        <div style="font-size:13px;color:var(--muted);margin-top:4px">completado</div>
        <div class="ob-num-row">
          <div class="ob-num-box"><div class="ob-num" style="color:var(--green)">${have}</div><div style="font-size:10px;color:var(--muted);font-weight:700">Tengo</div></div>
          <div class="ob-num-box"><div class="ob-num" style="color:var(--gold-d)">${doubles}</div><div style="font-size:10px;color:var(--muted);font-weight:700">Dobles</div></div>
          <div class="ob-num-box"><div class="ob-num" style="color:var(--red)">${missing}</div><div style="font-size:10px;color:var(--muted);font-weight:700">Faltan</div></div>
        </div>
      </div>
      <p style="font-size:13px;color:var(--muted);text-align:center;line-height:1.6;margin-top:8px">
        ¡Perfecto! Ahora podés buscar coleccionistas para intercambiar tus ${doubles} ${getTermPlural()} repetidas y conseguir las ${missing} que te faltan.
      </p>
    </div>
    <div class="ob-footer">
      <button class="btn btn-secondary" style="flex:1" onclick="obPrev()">← Revisar</button>
      <button class="btn btn-gold" style="flex:1" onclick="obFinish()">🚀 ¡Empezar!</button>
    </div>
  </div>`;
}

window.obToggleStk=function(id){
  const cur=obAlbum[id];
  if(!cur||cur.state==='missing')obAlbum[id]={state:'have',count:1};
  else obAlbum[id]={state:'missing'};
  renderOnboarding();
};

window.obSetCount=function(id,n){
  if(n===1){obAlbum[id]={state:'have',count:1};}
  else{obAlbum[id]={state:'double',count:n};}
  renderOnboarding();
};

window.obMarkAll=function(secId,mark){
  const sec=SECTIONS.find(s=>s.id===secId);
  if(!sec)return;
  for(let i=1;i<=sec.count;i++){
    const id=sec.prefix+i;
    obAlbum[id]=mark?{state:'have',count:1}:{state:'missing'};
  }
  renderOnboarding();
};

window.obNext=function(){
  obCurrentSec++;
  renderOnboarding();
  // Scroll to top of onboarding body
  setTimeout(()=>{const b=document.querySelector('.ob-body');if(b)b.scrollTop=0;},50);
};

window.obPrev=function(){
  if(obCurrentSec>0)obCurrentSec--;
  renderOnboarding();
  setTimeout(()=>{const b=document.querySelector('.ob-body');if(b)b.scrollTop=0;},50);
};

window.obSkip=function(){
  // Skip to summary with empty album
  obCurrentSec=SECTIONS.length;
  renderOnboarding();
};

window.obFinish=async function(){
  // Save album to Firestore
  await saveAlbum(obAlbum);
  userProfile.album=obAlbum;
  document.getElementById('onboarding-overlay').style.display='none';
  toast('🏆 ¡Álbum guardado!','gold');
  renderAlbum();
};

function scheduleDonationBanner(){
  // First appearance: 3 minutes after login
  // Subsequent: every 20 minutes
  const delay=donateShown===0 ? 3*60*1000 : 20*60*1000;
  clearTimeout(donateTimer);
  donateTimer=setTimeout(()=>{
    showDonateBanner();
  },delay);
}

function showDonateBanner(){
  // Don't show while chat is open or modal is open
  const chatOpen=document.getElementById('chat-overlay').style.display!=='none';
  const modalOpen=document.getElementById('modal-ov').style.display!=='none';
  if(chatOpen||modalOpen){scheduleDonationBanner();return;}
  donateShown++;
  const banner=document.getElementById('donate-banner');
  if(banner){
    // Vary the message
    const msgs=[
      {title:'¡Esta app es gratuita!',sub:'Si te es útil, podés invitarme un café ☕'},
      {title:'¿Encontraste tus '+getTermPlural()+'?',sub:'Apoyá el proyecto con una donación voluntaria'},
      {title:'Sin publicidad, sin costos',sub:'Si querés mantener esto vivo, podés colaborar 💙'},
      {title:'Gracias por usar la app 🏆',sub:'Una pequeña donación ayuda mucho a seguir mejorándola'},
    ];
    const m=msgs[(donateShown-1)%msgs.length];
    const titleEl=banner.querySelector('.d-title');
    const subEl=banner.querySelector('.d-sub');
    if(titleEl)titleEl.textContent=m.title;
    if(subEl)subEl.textContent=m.sub;
    banner.style.display='flex';
    // Auto-hide after 12 seconds
    setTimeout(()=>closeDonate(),12000);
  }
  scheduleDonationBanner();
}

let saveTimer=null;
async function toggleSticker(id){
  if(!currentUser||!userProfile)return;
  const album=userProfile.album||{};
  const cur=album[id];
  if(!cur||cur.state==='missing')album[id]={state:'have'};
  else if(cur.state==='have')album[id]={state:'double',count:2};
  else album[id]={state:'missing'};
  userProfile.album=album;
  renderAlbum();
  // Debounce saves - only save after 1.5s of no tapping

  saveTimer=setTimeout(()=>saveAlbum(album),1500);
}

window.adjCount=async function(id,delta){
  const album=userProfile?.album||{};
  const cur=album[id]||{state:'have',count:1};
  const newCount=Math.max(0,(cur.count||1)+delta);
  const display=document.getElementById('count-display');
  if(newCount===0){
    album[id]={state:'missing'};
    if(display)display.textContent='0';
    if(display)display.style.color='var(--red)';
  } else if(newCount===1){
    album[id]={state:'have',count:1};
    if(display)display.textContent='1';
    if(display)display.style.color='var(--green)';
  } else {
    album[id]={state:'double',count:newCount};
    if(display)display.textContent=String(newCount);
    if(display)display.style.color='var(--gold-d)';
  }
  userProfile.album=album;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>saveAlbum(album),800);
};

let matchProximity='all';
async function renderMatches(){
  if(!allUsers.length)await loadAllUsers();
  const tab=document.getElementById('tab-matches');
  const myAlbum=userProfile?.album||{};
  const myCity=userProfile?.city||'';
  const myDoubles=getDoublesList(myAlbum);
  const myMissing=getMissingList(myAlbum);

  let filtered=allUsers.filter(u=>u.id!==currentUser?.uid);
  if(matchProximity==='city')filtered=filtered.filter(u=>u.city===myCity);
  else if(matchProximity==='country'){
    // match by country prefix from city name (simple heuristic using known cities)
    const myCountry=getCityCountry(myCity);
    filtered=filtered.filter(u=>getCityCountry(u.city)===myCountry);
  }

  const matches=filtered.map(other=>{
    const oa=other.album||{};
    const od=getDoublesList(oa);const om=getMissingList(oa);
    const canGive=myDoubles.filter(n=>om.includes(n)).length;
    const canReceive=od.filter(n=>myMissing.includes(n)).length;
    const score=Math.min(canGive,canReceive);
    const sameCity=other.city===myCity;
    const sameCountry=getCityCountry(other.city)===getCityCountry(myCity);
    return{user:other,canGive,canReceive,score,perfect:Math.abs(canGive-canReceive)<=1&&score>=1,sameCity,sameCountry};
  }).filter(m=>m.score>0).sort((a,b)=>{
    // Sort: same city first, then same country, then by score
    if(a.sameCity&&!b.sameCity)return -1;
    if(!a.sameCity&&b.sameCity)return 1;
    if(a.sameCountry&&!b.sameCountry)return -1;
    if(!a.sameCountry&&b.sameCountry)return 1;
    return b.score-a.score;
  });

  const term=getTermPlural();
  let h=`<div style="background:var(--green);padding:13px;color:#fff">
    <div style="font-family:'Anton',sans-serif;font-size:18px;letter-spacing:1px">MIS MATCHES</div>
    <div style="font-size:11px;opacity:.8;margin-top:2px">${matches.length} coleccionistas compatibles</div>
  </div>
  <div class="filter-row">
    <button class="chip ${matchProximity==='all'?'act':''}" onclick="setMatchProx('all')">🌎 Todos</button>
    <button class="chip ${matchProximity==='country'?'act':''}" onclick="setMatchProx('country')">🗺️ Mi país</button>
    <button class="chip ${matchProximity==='city'?'act':''}" onclick="setMatchProx('city')">📍 Mi ciudad</button>
  </div>`;

  if(!matches.length){
    const emptyMsg=matchProximity!=='all'?'en tu zona. Probá ampliar el filtro.':'aún. Marcá '+getTermPlural()+' en tu álbum para encontrar coincidencias.';
    tab.innerHTML=h+`<div class="empty"><div class="ei">🔍</div><p>No hay matches ${emptyMsg}</p></div>`;
    return;
  }
  matches.forEach(({user:other,canGive,canReceive,perfect,sameCity,sameCountry})=>{
    const rating=getUserRating(other);
    let proxBadge='';
    if(sameCity)proxBadge=`<span style="background:#e8f5ee;color:var(--green-d);border-radius:100px;padding:2px 8px;font-size:10px;font-weight:700">📍 Tu ciudad</span>`;
    else if(sameCountry)proxBadge=`<span style="background:#e8f0ff;color:#3346a0;border-radius:100px;padding:2px 8px;font-size:10px;font-weight:700">🗺️ Tu país</span>`;
    h+=`<div class="match-card ${perfect?'perf':''}">
      <div style="display:flex;gap:6px;margin-bottom:7px;flex-wrap:wrap">
        ${perfect?`<div class="m-badge">✦ Match Perfecto</div>`:''}
        ${proxBadge}
      </div>
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:9px">
        ${avHtml(other)}<div>
          <div style="font-weight:700;font-size:14px">${other.alias}</div>
          <div style="font-size:11px;color:var(--muted);display:flex;gap:8px"><span>📍 ${other.city}</span>${starsHtml(rating)}</div>
        </div>
      </div>
      <div class="m-nums">
        <div class="m-box"><div class="m-num g">${canGive}</div><div style="font-size:9px;color:var(--muted);font-weight:600">Puedo darle</div></div>
        <div style="display:flex;align-items:center;color:var(--muted);font-size:18px">⇄</div>
        <div class="m-box"><div class="m-num au">${canReceive}</div><div style="font-size:9px;color:var(--muted);font-weight:600">Me puede dar</div></div>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="openChatWith('${other.id}')">💬 Iniciar intercambio</button>
    </div>`;
  });
  tab.innerHTML=h;
}

window.openChatWith=async function(userId){
  let conv=conversations.find(c=>c.participants.includes(currentUser.uid)&&c.participants.includes(userId));
  if(!conv){
    const ref=await addDoc(collection(db,'conversations'),{
      participants:[currentUser.uid,userId],messages:[],
      lastMessage:'',updatedAt:serverTimestamp()
    });
    conv={id:ref.id,participants:[currentUser.uid,userId],messages:[],updatedAt:nowTs()};
    conversations.push(conv);
  }
  currentTab='messages';
  setTab('messages');
  openChat(conv.id);
};

window.openChat=async function(convId){
  const conv=conversations.find(c=>c.id===convId);
  if(!conv)return;
  const otherId=conv.participants.find(id=>id!==currentUser.uid);
  const other=allUsers.find(u=>u.id===otherId)||{alias:'Usuario',city:'',avatar:'👤'};

  // Cargar mensajes desde Firestore
  const msgsSnap=await getDocs(query(collection(db,'conversations',convId,'messages'),orderBy('createdAt','asc')));
  const msgs=msgsSnap.docs.map(d=>({id:d.id,...d.data(),ts:d.data().createdAt?.toMillis?.()??nowTs()}));
  conv.messages=msgs;

function renderMsgList(msgs){
  let h='';
  msgs.forEach(msg=>{
    const mine=msg.from===currentUser?.uid;
    if(msg.type==='proposal'){
      h+=renderProposalBubble(msg,mine);
    } else {
      h+=`<div style="display:flex;flex-direction:column;align-items:${mine?'flex-end':'flex-start'}">
        <div class="bubble ${mine?'mine':'theirs'}">${msg.text}</div>
        <div style="font-size:9px;opacity:.55;margin-top:3px;text-align:${mine?'right':'left'}">${timeAgo(msg.ts)}</div>
      </div>`;
    }
  });
  return h;
}

function renderProposalBubble(msg,mine){
  const sc={pending:'s-pend',accepted:'s-acc',completed:'s-comp',rejected:'s-rej'}[msg.status]||'s-pend';
  const sl={pending:'⏳ Pendiente',accepted:'✅ Aceptada',completed:'🏆 Completada',rejected:'❌ Rechazada'}[msg.status];
  let actBtns='';
  if(msg.status==='pending'&&!mine)actBtns=`<div style="display:flex;gap:5px">
    <button class="btn btn-sm" style="background:#e8f5ee;color:var(--green-d);min-height:30px" onclick="proposalAction('${msg.convId}','${msg.id}','accept')">✓</button>
    <button class="btn btn-sm btn-danger" style="min-height:30px" onclick="proposalAction('${msg.convId}','${msg.id}','reject')">✕</button>
  </div>`;
  if(msg.status==='accepted'&&mine)actBtns=`<button class="btn btn-sm btn-gold" style="min-height:30px" onclick="proposalAction('${msg.convId}','${msg.id}','complete')">🏆 Completar</button>`;
  return`<div class="prop-bubble" style="align-self:${mine?'flex-end':'flex-start'}">
    <div class="prop-title">📋 Propuesta de intercambio</div>
    <div class="prop-row">
      <div class="prop-col"><div style="font-size:9px;font-weight:700;color:var(--muted);margin-bottom:3px">Entrego</div>${pillsHtml(msg.give||[],'off',6)}</div>
      <div class="prop-col"><div style="font-size:9px;font-weight:700;color:var(--muted);margin-bottom:3px">Recibo</div>${pillsHtml(msg.receive||[],'wnt',6)}</div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px">
      <span class="pstatus ${sc}">${sl}</span>${actBtns}
    </div>
  </div>`;
}

window.sendMsg=async function(convId){
  const inp=document.getElementById('ci');
  if(!inp?.value.trim())return;
  const text=inp.value.trim();inp.value='';
  const msgRef=await addDoc(collection(db,'conversations',convId,'messages'),{
    from:currentUser.uid,text,createdAt:serverTimestamp()
  });
  await updateDoc(doc(db,'conversations',convId),{lastMessage:text,updatedAt:serverTimestamp()});
  const conv=conversations.find(c=>c.id===convId);
  if(conv){
    const msg={id:msgRef.id,from:currentUser.uid,text,ts:nowTs()};
    conv.messages=[...(conv.messages||[]),msg];
    const msgs=document.getElementById('cv-msgs');
    if(msgs){msgs.innerHTML=renderMsgList(conv.messages);msgs.scrollTop=msgs.scrollHeight;}
  }
};

window.proposalAction=async function(convId,msgId,action){
  const statusMap={accept:'accepted',reject:'rejected',complete:'completed'};
  await updateDoc(doc(db,'conversations',convId,'messages',msgId),{status:statusMap[action]});
  if(action==='complete'){
    // Actualizar álbumes
    const msgSnap=await getDoc(doc(db,'conversations',convId,'messages',msgId));
    const msg=msgSnap.data();
    const conv=conversations.find(c=>c.id===convId);
    const otherId=conv?.participants.find(id=>id!==currentUser.uid);
    const otherSnap=await getDoc(doc(db,'users',otherId));
    const otherData=otherSnap.data()||{};
    const myAlbum={...userProfile.album||{}};
    const otherAlbum={...otherData.album||{}};
    (msg.give||[]).forEach(n=>{
      const s=myAlbum[n];
      if(s?.state==='double'&&(s.count||2)>2)myAlbum[n]={...s,count:s.count-1};
      else if(s?.state==='double')myAlbum[n]={state:'have'};
      otherAlbum[n]={state:'have'};
    });
    (msg.receive||[]).forEach(n=>{
      const s=otherAlbum[n];
      if(s?.state==='double'&&(s.count||2)>2)otherAlbum[n]={...s,count:s.count-1};
      else if(s?.state==='double')otherAlbum[n]={state:'have'};
      myAlbum[n]={state:'have'};
    });
    await updateDoc(doc(db,'users',currentUser.uid),{album:myAlbum});
    await updateDoc(doc(db,'users',otherId),{album:otherAlbum});
    userProfile.album=myAlbum;
    toast('🏆 ¡Intercambio completado! Los álbumes se actualizaron.');
    showRateModal(otherId);
  } else {
    const labels={accept:'✅ Propuesta aceptada',reject:'❌ Propuesta rechazada'};
    toast(labels[action]||'');
  }
  // Recargar chat
  const conv=conversations.find(c=>c.id===convId);
  if(conv){const m=conv.messages.find(x=>x.id===msgId);if(m)m.status=statusMap[action];}
  const msgs=document.getElementById('cv-msgs');
  const conv2=conversations.find(c=>c.id===convId);
  if(msgs&&conv2)msgs.innerHTML=renderMsgList(conv2.messages);
};

window.openProposeModal=function(convId,otherId){
  const other=allUsers.find(u=>u.id===otherId)||{alias:'',album:{}};
  const myAlbum=userProfile?.album||{};
  const canGive=getDoublesList(myAlbum).filter(n=>getMissingList(other.album||{}).includes(n));
  const canReceive=getDoublesList(other.album||{}).filter(n=>getMissingList(myAlbum).includes(n));
  const body=`<div style="margin-bottom:14px">
    <div class="plabel" style="margin-bottom:6px">Yo le doy a ${other.alias}</div>
    ${canGive.length===0?'<p style="font-size:11px;color:var(--muted)">No tenés dobles que le falten</p>':
    `<div class="pills" id="prop-give">${canGive.slice(0,30).map(n=>`<span class="pill" style="cursor:pointer" data-n="${n}" onclick="this.classList.toggle('off')">#${n}</span>`).join('')}</div>`}
  </div>
  <div>
    <div class="plabel" style="margin-bottom:6px">${other.alias} me da</div>
    ${canReceive.length===0?'<p style="font-size:11px;color:var(--muted)">No tiene dobles que te falten</p>':
    `<div class="pills" id="prop-receive">${canReceive.slice(0,30).map(n=>`<span class="pill" style="cursor:pointer" data-n="${n}" onclick="this.classList.toggle('wnt')">#${n}</span>`).join('')}</div>`}
  </div>`;
  showModal('Proponer Intercambio',body,async()=>{
    const give=[...(document.querySelectorAll('#prop-give .pill.off')||[])].map(el=>+el.dataset.n);
    const receive=[...(document.querySelectorAll('#prop-receive .pill.wnt')||[])].map(el=>+el.dataset.n);
    if(!give.length&&!receive.length){toast('Seleccioná al menos una lámina');return;}
    const msgRef=await addDoc(collection(db,'conversations',convId,'messages'),{
      from:currentUser.uid,type:'proposal',give,receive,status:'pending',
      convId,createdAt:serverTimestamp()
    });
    await updateDoc(doc(db,'conversations',convId),{lastMessage:'📋 Propuesta de intercambio',updatedAt:serverTimestamp()});
    toast('📋 Propuesta enviada');closeModal();
    const conv=conversations.find(c=>c.id===convId);
    if(conv){
      conv.messages=[...(conv.messages||[]),{id:msgRef.id,from:currentUser.uid,type:'proposal',give,receive,status:'pending',convId,ts:nowTs()}];
      const msgs=document.getElementById('cv-msgs');
      if(msgs){msgs.innerHTML=renderMsgList(conv.messages);msgs.scrollTop=msgs.scrollHeight;}
    }
  },'Enviar propuesta');
};

const GROUP_EMOJIS=['⚽','🏆','🎯','🦁','🔥','💎','🌟','🏅','👑','🎪','🏟️','🎭','🎨','🚀','💪','🦅','🐯','🦊','🌍','🎸','🍕','☕','🏄','🎲','🤝','🏫','🏢','🎓','👨‍👩‍👧‍👦','🌈'];
let myGroups=[];

let groupSearch='';

function genGroupCode(){return 'GRP-'+Math.floor(1000+Math.random()*9000);}

async function loadMyGroups(){
  if(!currentUser)return;
  const {query,collection,where,getDocs,orderBy}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const snap=await getDocs(query(collection(db,'groups'),where('memberIds','array-contains',currentUser.uid)));
  myGroups=snap.docs.map(d=>({id:d.id,...d.data(),createdAt:d.data().createdAt?.toMillis?.()??nowTs()}));
}

async function loadAllGroups(search=''){
  const {query,collection,getDocs,orderBy,limit}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const snap=await getDocs(collection(db,'groups'));
  allGroupsCache=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(search)allGroupsCache=allGroupsCache.filter(g=>g.name.toLowerCase().includes(search.toLowerCase())||g.description?.toLowerCase().includes(search.toLowerCase()));
}

async function renderGroups(){
  await loadMyGroups();
  const tab=document.getElementById('tab-groups');
  let h=`<div style="background:var(--green);padding:13px;color:#fff">
    <div style="font-family:'Anton',sans-serif;font-size:18px;letter-spacing:1px">👥 GRUPOS</div>

    <button class="chip" id="gtab-join" onclick="showJoinByCode()">🔑 Código</button>
  </div>
  <div id="groups-content">`;

    h+=`<div class="empty"><div class="ei">👥</div><p>Aún no estás en ningún grupo.<br>Creá uno o buscá uno existente.</p></div>`;
  } else {

function groupCardHtml(g, isMine){
  const memberCount=g.memberIds?.length||1;
  const pendingCount=g.pendingIds?.length||0;
  const isAdmin=g.adminId===currentUser?.uid;
  let roleBadge='';
  if(isAdmin)roleBadge=`<span class="join-badge join-admin">Admin</span>`;
  else if(isMine)roleBadge=`<span class="join-badge join-member">Miembro</span>`;
  return`<div class="group-card" onclick="openGroup('${g.id}')">
    <div style="display:flex;align-items:center;gap:11px">
      <div class="group-icon">${g.emoji||'⚽'}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <div class="group-name">${g.name}</div>${roleBadge}
        </div>
        <div class="group-desc">${g.description||'Sin descripción'}</div>
        <div class="group-meta">
          <span>👥 ${memberCount} miembro${memberCount!==1?'s':''}</span>
          ${pendingCount&&isAdmin?`<span style="color:var(--gold-d)">⏳ ${pendingCount} pendiente${pendingCount!==1?'s':''}</span>`:''}
          <span>🔑 ${g.code}</span>
        </div>
      </div>
    </div>
  </div>`;
}

window.showGroupsTab=async function(tab){
  document.querySelectorAll('[id^="gtab-"]').forEach(el=>el.classList.remove('act'));
  document.getElementById('gtab-'+tab)?.classList.add('act');
  const cont=document.getElementById('groups-content');
  if(!cont)return;
  if(tab==='mine'){
    await loadMyGroups();
    if(!myGroups.length){cont.innerHTML=`<div class="empty"><div class="ei">👥</div><p>No estás en ningún grupo aún.</p></div>`;return;}
    cont.innerHTML=myGroups.map(g=>groupCardHtml(g,true)).join('');
  } else {
    await loadAllGroups(groupSearch);
    const others=allGroupsCache.filter(g=>!g.memberIds?.includes(currentUser?.uid)&&!g.pendingIds?.includes(currentUser?.uid));
    const pending=allGroupsCache.filter(g=>g.pendingIds?.includes(currentUser?.uid));
    let h='';
    if(pending.length){
      h+=`<div style="padding:8px 14px 4px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase">Solicitudes pendientes</div>`;
      h+=pending.map(g=>`<div class="group-card">
        <div style="display:flex;align-items:center;gap:11px">
          <div class="group-icon">${g.emoji||'⚽'}</div>
          <div style="flex:1"><div class="group-name">${g.name}</div><div class="group-desc">${g.description||''}</div></div>
          <span class="join-badge join-pending">⏳ Pendiente</span>
        </div>
      </div>`).join('');
    }
    h+=`<div style="padding:8px 14px 4px"><div class="search-box" style="margin:0">
      <span>🔍</span>
      <input placeholder="Buscar grupos..." oninput="searchGroups(this.value)" style="flex:1;border:none;outline:none;padding:8px 7px;font-size:13px;font-family:inherit;background:transparent">
    </div></div>`;
    if(!others.length)h+=`<div class="empty"><div class="ei">🔍</div><p>No hay más grupos disponibles.</p></div>`;
    else h+=others.map(g=>`<div class="group-card">
      <div style="display:flex;align-items:center;gap:11px">
        <div class="group-icon">${g.emoji||'⚽'}</div>
        <div style="flex:1;min-width:0">
          <div class="group-name">${g.name}</div>
          <div class="group-desc">${g.description||''}</div>
          <div class="group-meta"><span>👥 ${g.memberIds?.length||1}</span><span>🔑 ${g.code}</span></div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();requestJoinGroup('${g.id}')">Solicitar</button>
      </div>
    </div>`).join('');
    cont.innerHTML=h;
  }
};

window.searchGroups=async function(v){
  groupSearch=v;
  await loadAllGroups(v);
  const others=allGroupsCache.filter(g=>!g.memberIds?.includes(currentUser?.uid));
  const cont=document.getElementById('groups-content');
  if(cont){
    const cards=others.map(g=>`<div class="group-card">
      <div style="display:flex;align-items:center;gap:11px">
        <div class="group-icon">${g.emoji||'⚽'}</div>
        <div style="flex:1;min-width:0">
          <div class="group-name">${g.name}</div>
          <div class="group-desc">${g.description||''}</div>
          <div class="group-meta"><span>👥 ${g.memberIds?.length||1}</span></div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();requestJoinGroup('${g.id}')">Solicitar</button>
      </div>

    // Replace only the cards part after the search box
    const existing=cont.innerHTML;

// JOIN BY CODE
window.showJoinByCode=function(){
  showModal('Unirse con código',`
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Ingresá el código del grupo (formato GRP-XXXX)</p>
    <input class="form-input" id="join-code-input" placeholder="GRP-1234" style="text-transform:uppercase;letter-spacing:2px;font-family:'Anton',sans-serif;font-size:18px;text-align:center">
  `,async()=>{
    const code=document.getElementById('join-code-input').value.trim().toUpperCase();
    if(!code.startsWith('GRP-')||code.length!==8){toast('Código inválido. Formato: GRP-1234');return;}
    const {query,collection,where,getDocs}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const snap=await getDocs(query(collection(db,'groups'),where('code','==',code)));
    if(snap.empty){toast('Código no encontrado','err');return;}
    const gDoc=snap.docs[0];
    const g={id:gDoc.id,...gDoc.data()};
    if(g.memberIds?.includes(currentUser.uid)){toast('Ya sos miembro de este grupo');closeModal();return;}
    // Code join = auto approved
    const {updateDoc,arrayUnion}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    await updateDoc(gDoc.ref,{memberIds:arrayUnion(currentUser.uid)});
    toast(`✅ ¡Te uniste a ${g.name}!`,'gold');
    closeModal();
    await renderGroups();
  },'Unirse');
};

// REQUEST JOIN
window.requestJoinGroup=async function(groupId){
  const {doc,updateDoc,arrayUnion}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const g=allGroupsCache.find(x=>x.id===groupId);
  if(!g)return;
  if(g.memberIds?.includes(currentUser.uid)){toast('Ya sos miembro');return;}
  if(g.pendingIds?.includes(currentUser.uid)){toast('Ya enviaste una solicitud');return;}
  await updateDoc(doc(db,'groups',groupId),{pendingIds:arrayUnion(currentUser.uid)});
  toast(`📨 Solicitud enviada a "${g.name}"`);
  showGroupsTab('discover');
};

async function loadGroupTab(tab,g){
  const cont=document.getElementById('group-tab-content');
  if(!cont)return;
  const isAdmin=g.adminId===currentUser?.uid;

  if(tab==='members'){
    // Load member profiles
    const {doc,getDoc}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const members=await Promise.all((g.memberIds||[]).map(async id=>{
      const snap=await getDoc(doc(db,'users',id));
      return snap.exists()?{id:snap.id,...snap.data()}:null;
    }));
    const pending=isAdmin?await Promise.all((g.pendingIds||[]).map(async id=>{
      const snap=await getDoc(doc(db,'users',id));
      return snap.exists()?{id:snap.id,...snap.data()}:null;
    })):[];

    let h='';
    if(isAdmin&&pending.filter(Boolean).length){
      h+=`<div style="padding:10px 14px 4px;font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase">⏳ Solicitudes pendientes</div>`;
      pending.filter(Boolean).forEach(u=>{
        h+=`<div class="member-row">
          ${avHtml(u)}
          <div style="flex:1"><div style="font-weight:700;font-size:13px">${u.alias}</div><div style="font-size:11px;color:var(--muted)">📍 ${u.city}</div></div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm" style="background:#e8f5ee;color:var(--green-d);min-height:32px" onclick="approveGroupMember('${g.id}','${u.id}')">✓</button>
            <button class="btn btn-sm btn-danger" style="min-height:32px" onclick="rejectGroupMember('${g.id}','${u.id}')">✕</button>
          </div>
        </div>`;
      });
      h+=`<div style="height:1px;background:var(--gray-l);margin:4px 0"></div>`;
    }

    h+=`<div style="padding:10px 14px 4px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase">Miembros (${members.filter(Boolean).length})</div>`;
    members.filter(Boolean).forEach(u=>{
      const stats=getAlbumStats(u.album||{});
      const pct=Math.round(stats.have/TOTAL_STICKERS*100);
      const isMe=u.id===currentUser?.uid;
      h+=`<div class="member-row">
        ${avHtml(u)}
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:13px">${u.alias}${isMe?' (vos)':''}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">
            <div style="background:var(--gray-l);border-radius:100px;height:5px;width:100%;overflow:hidden;margin-top:4px">
              <div style="background:var(--green);height:100%;border-radius:100px;width:${pct}%"></div>
            </div>
            <span>${pct}% completado</span>
          </div>
        </div>
        ${!isMe?`<button class="btn btn-sm" style="background:var(--gray-l);color:var(--text);min-height:32px" onclick="openChatWith('${u.id}')">💬</button>`:''}
        ${isAdmin&&!isMe?`<button class="btn btn-sm btn-danger" style="min-height:32px" onclick="removeMember('${g.id}','${u.id}')">✕</button>`:''}
      </div>`;
    });
    if(isAdmin){
      h+=`<div style="padding:14px">
        <button class="btn btn-danger btn-full" onclick="deleteGroup('${g.id}','${g.name}')">🗑 Eliminar grupo</button>
      </div>`;
    } else {
      h+=`<div style="padding:14px">
        <button class="btn btn-secondary btn-full" onclick="leaveGroup('${g.id}')">🚪 Salir del grupo</button>
      </div>`;
    }
    cont.innerHTML=h;
  }

  else if(tab==='matches'){
    const {doc,getDoc}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const members=await Promise.all((g.memberIds||[]).filter(id=>id!==currentUser?.uid).map(async id=>{
      const snap=await getDoc(doc(db,'users',id));
      return snap.exists()?{id:snap.id,...snap.data()}:null;
    }));
    const myAlbum=userProfile?.album||{};
    const myDoubles=getDoublesList(myAlbum);
    const myMissing=getMissingList(myAlbum);
    const matches=members.filter(Boolean).map(other=>{
      const oa=other.album||{};
      const od=getDoublesList(oa);const om=getMissingList(oa);
      const canGive=myDoubles.filter(n=>om.includes(n)).length;
      const canReceive=od.filter(n=>myMissing.includes(n)).length;
      const score=Math.min(canGive,canReceive);
      return{user:other,canGive,canReceive,score,perfect:Math.abs(canGive-canReceive)<=1&&score>=1};
    }).filter(m=>m.score>0).sort((a,b)=>b.score-a.score);

    const term=getTermPlural();
    let h=`<div style="padding:12px 14px;font-size:12px;color:var(--muted)">Matches con los ${g.memberIds?.length-1} miembros del grupo</div>`;
    if(!matches.length)h+=`<div class="empty"><div class="ei">🔍</div><p>No hay matches dentro del grupo aún. Marcá más ${term} en tu álbum.</p></div>`;
    matches.forEach(({user:other,canGive,canReceive,perfect})=>{
      h+=`<div class="match-card ${perfect?'perf':''}" style="margin:7px 14px">
        ${perfect?`<div class="m-badge">✦ Match Perfecto</div>`:''}
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:9px">
          ${avHtml(other)}<div>
            <div style="font-weight:700;font-size:14px">${other.alias}</div>
            <div style="font-size:11px;color:var(--muted)">${starsHtml(getUserRating(other))}</div>
          </div>
        </div>
        <div class="m-nums">
          <div class="m-box"><div class="m-num g">${canGive}</div><div style="font-size:9px;color:var(--muted);font-weight:600">Puedo darle</div></div>
          <div style="display:flex;align-items:center;color:var(--muted);font-size:18px">⇄</div>
          <div class="m-box"><div class="m-num au">${canReceive}</div><div style="font-size:9px;color:var(--muted);font-weight:600">Me puede dar</div></div>
        </div>
        <button class="btn btn-primary btn-full" onclick="openChatWith('${other.id}')">💬 Iniciar intercambio</button>
      </div>`;
    });
    cont.innerHTML=h;
  }

  else if(tab==='chat'){
    const {collection,getDocs,query,orderBy,addDoc,serverTimestamp}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const msgsSnap=await getDocs(query(collection(db,'groups',g.id,'messages'),orderBy('createdAt','asc')));
    const msgs=msgsSnap.docs.map(d=>({id:d.id,...d.data(),ts:d.data().createdAt?.toMillis?.()??nowTs()}));
    let h=`<div style="display:flex;flex-direction:column;height:100%">
      <div id="gchat-msgs" style="flex:1;overflow-y:auto;padding:11px 14px;display:flex;flex-direction:column;gap:7px">`;
    if(!msgs.length)h+=`<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px">Nadie ha escrito aún. ¡Sé el primero!</div>`;
    msgs.forEach(msg=>{
      const mine=msg.from===currentUser?.uid;
      const sender=allUsers.find(u=>u.id===msg.from)||{alias:'Usuario',avatar:'👤'};
      h+=`<div style="display:flex;flex-direction:column;align-items:${mine?'flex-end':'flex-start'}">
        ${!mine?`<div style="font-size:10px;color:var(--muted);margin-bottom:2px">${sender.alias}</div>`:''}
        <div class="bubble ${mine?'mine':'theirs'}">${msg.text}</div>
        <div style="font-size:9px;opacity:.55;margin-top:3px">${timeAgo(msg.ts)}</div>
      </div>`;
    });
    h+=`</div>
      <div style="display:flex;gap:7px;padding:9px 14px;background:#fff;border-top:1px solid var(--gray-l);flex-shrink:0">
        <input class="c-input" id="gchat-input" placeholder="Mensaje al grupo..." onkeydown="if(event.key==='Enter')sendGroupMsg('${g.id}')">
        <button class="send-btn" onclick="sendGroupMsg('${g.id}')">↑</button>
      </div>
    </div>`;
    cont.innerHTML=h;
    setTimeout(()=>{const m=document.getElementById('gchat-msgs');if(m)m.scrollTop=m.scrollHeight;},50);
  }

  else if(tab==='ranking'){
    const {doc,getDoc}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const members=await Promise.all((g.memberIds||[]).map(async id=>{
      const snap=await getDoc(doc(db,'users',id));
      return snap.exists()?{id:snap.id,...snap.data()}:null;
    }));
    const ranked=members.filter(Boolean).map(u=>{
      const stats=getAlbumStats(u.album||{});
      const pct=Math.round(stats.have/TOTAL_STICKERS*100);
      return{...u,pct,have:stats.have,doubles:stats.doubles};
    }).sort((a,b)=>b.pct-a.pct);

    let h=`<div style="padding:12px 14px;font-size:12px;color:var(--muted)">Ranking de progreso del grupo</div>`;
    ranked.forEach((u,i)=>{
      const rankClass=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
      const isMe=u.id===currentUser?.uid;
      h+=`<div class="member-row" style="${isMe?'background:#f0f8f4':''}">
        <div class="rank-badge ${rankClass}">${i+1}</div>
        ${avHtml(u)}
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:13px">${u.alias}${isMe?' 👈':''}</div>
          <div style="margin-top:4px">
            <div style="background:var(--gray-l);border-radius:100px;height:6px;width:100%;overflow:hidden">
              <div style="background:${i===0?'var(--gold)':'var(--green)'};height:100%;border-radius:100px;width:${u.pct}%;transition:width .5s"></div>
            </div>
            <div style="font-size:10px;color:var(--muted);margin-top:3px">${u.have} ${getTermPlural()} · ${u.pct}%</div>
          </div>
        </div>
        <div style="font-family:'Anton',sans-serif;font-size:20px;color:${i===0?'var(--gold-d)':'var(--green)'}">${u.pct}%</div>
      </div>`;
    });
    cont.innerHTML=h;
  }
}

window.sendGroupMsg=async function(groupId){
  const inp=document.getElementById('gchat-input');
  if(!inp?.value.trim())return;
  const text=inp.value.trim();inp.value='';
  const {addDoc,collection,serverTimestamp,doc,updateDoc}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  await addDoc(collection(db,'groups',groupId,'messages'),{from:currentUser.uid,text,createdAt:serverTimestamp()});
  const msgs=document.getElementById('gchat-msgs');
  if(msgs){
    const me=userProfile;
    const div=document.createElement('div');
    div.style.cssText='display:flex;flex-direction:column;align-items:flex-end';
    div.innerHTML=`<div class="bubble mine">${text}</div><div style="font-size:9px;opacity:.55;margin-top:3px">ahora</div>`;
    msgs.appendChild(div);
    msgs.scrollTop=msgs.scrollHeight;
  }
};

window.approveGroupMember=async function(groupId,userId){
  const {doc,updateDoc,arrayUnion,arrayRemove}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  await updateDoc(doc(db,'groups',groupId),{memberIds:arrayUnion(userId),pendingIds:arrayRemove(userId)});
  toast('✅ Miembro aprobado');
  openGroup(groupId);
};
window.rejectGroupMember=async function(groupId,userId){
  const {doc,updateDoc,arrayRemove}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  await updateDoc(doc(db,'groups',groupId),{pendingIds:arrayRemove(userId)});
  toast('❌ Solicitud rechazada');
  openGroup(groupId);
};
window.removeMember=async function(groupId,userId){
  if(!confirm('¿Querés remover a este miembro?'))return;
  const {doc,updateDoc,arrayRemove}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  await updateDoc(doc(db,'groups',groupId),{memberIds:arrayRemove(userId)});
  toast('Miembro removido');openGroup(groupId);
};
window.leaveGroup=async function(groupId){
  if(!confirm('¿Querés salir del grupo?'))return;
  const {doc,updateDoc,arrayRemove}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  await updateDoc(doc(db,'groups',groupId),{memberIds:arrayRemove(currentUser.uid)});
  toast('Saliste del grupo');closeGroupOverlay();renderGroups();
};
window.deleteGroup=async function(groupId,name){
  if(!confirm(`¿Eliminar el grupo "${name}"? Esta acción no se puede deshacer.`))return;
  const {doc,deleteDoc}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  await deleteDoc(doc(db,'groups',groupId));
  toast('Grupo eliminado');closeGroupOverlay();renderGroups();
};
window.shareGroupCode=function(code){
  try{navigator.clipboard.writeText(code);}catch(e){}
  toast('✅ Código copiado: '+code,'gold');
};
window.closeGroupOverlay=function(){
  const ov=document.getElementById('group-overlay');
  ov.style.display='none';ov.innerHTML='';
  currentGroupId=null;
};

function renderFaq(){
  const tab=document.getElementById('tab-faq');
  const term=getTermPlural();
  const termCap=getTermPlural(true);
  const faqItems=[
    {
      q:`¿Cómo marco una ${getTerm()} como obtenida?`,
      a:`En la sección Álbum, tocá cualquier ${getTerm()}. El primer toque la marca como ✓ Tengo (verde). El segundo toque la marca como ★ Doble (amarillo). El tercero la vuelve a Falta (gris). Así podés llevar un registro exacto de tu colección.`
    },
    {
      q:`¿Cómo funciona el sistema de Matches?`,
      a:`El motor de matching cruza automáticamente tu álbum con el de todos los demás usuarios. Calcula cuántas ${term} podés darle a cada persona (tus dobles que a ellos les faltan) y cuántas ellos pueden darte. Podés filtrar por ciudad o país para encontrar coleccionistas cercanos. Un "Match Perfecto ✦" aparece cuando el intercambio es equilibrado (ambos se dan cantidades similares).`
    },
    {
      q:`¿Cómo propongo un intercambio?`,
      a:`Encontrá un coleccionista en Matches o Tablón → tocá "Iniciar intercambio" → se abre el chat → tocá "📋 Proponer" → seleccioná qué ${term} entregás y cuáles recibís → "Enviar propuesta". El otro usuario verá la propuesta con botones para Aceptar o Rechazar. Una vez aceptada, el que inició puede marcarla como Completada.`
    },
    {
      q:`¿Qué pasa cuando marco un intercambio como Completado?`,
      a:`El álbum de ambas personas se actualiza automáticamente: las ${term} que entregaste se descuentan de tus dobles, y las que recibiste se marcan como "Tengo" en tu álbum. Además aparece un prompt para valorar al otro coleccionista con 1 a 5 estrellas.`
    },
    {
      q:`¿Cómo me aseguro de que el intercambio es seguro?`,
      a:`La app funciona como un sistema de confianza entre coleccionistas. Para intercambios seguros te recomendamos: 1) Revisar el rating y comentarios del otro usuario antes de acordar. 2) Si es tu primer intercambio con alguien, empezá con pocas ${term}. 3) Coordiná el encuentro en un lugar público. 4) Contá las ${term} antes de dárselas. 5) Valorá siempre al otro usuario después para ayudar a la comunidad.`
    },
    {
      q:`¿Cómo funciona el sistema de valoraciones?`,
      a:`Después de completar un intercambio podés valorar al otro coleccionista de 1 a 5 estrellas con un comentario opcional de hasta 100 caracteres. El rating promedio aparece en el perfil de cada usuario y en el Tablón. Un usuario con muchas valoraciones positivas es más confiable para intercambiar.`
    },
    {
      q:`¿Cómo publico mis ${term} en el Tablón?`,
      a:`Primero marcá tus dobles en el Álbum. Luego andá al Tablón → tocá el botón + → seleccioná cuáles ${term} ofrecés (de tus dobles) y cuáles buscás → "Publicar". Tu publicación aparecerá en el feed para que otros coleccionistas te contacten.`
    },
    {
      q:`¿Mis datos se guardan si cierro la app?`,
      a:`Sí. Al estar registrado con Google o Email, tu álbum y toda tu actividad se guarda en la nube (Firebase). Podés abrir la app desde cualquier dispositivo y tu progreso estará disponible.`
    },
    {
      q:`¿Cómo comparto mi código de coleccionista?`,
      a:`En tu Perfil aparece tu código único (formato COL-XXXX). Tocalo para copiarlo al portapapeles y compartilo con otros coleccionistas para que te encuentren fácilmente.`
    },
    {
      q:`¿Cómo filtro los Matches por ciudad o país?`,
      a:`En la sección Matches hay tres filtros arriba: "🌎 Todos" muestra todos los coleccionistas, "🗺️ Mi país" filtra solo los de tu país, y "📍 Mi ciudad" muestra solo los de tu ciudad. Además, los coleccionistas de tu ciudad y país aparecen primero en la lista aunque uses el filtro global.`
    },
    {
      q:`¿Qué significan los códigos de las ${term} (MEX1, ARG5, etc.)?`,
      a:`Cada código corresponde a una ${getTerm()} real del álbum oficial Panini FIFA World Cup 2026. El prefijo indica la selección (ARG = Argentina, BRA = Brasil, ESP = España, etc.) y el número es la posición dentro de ese grupo. Cada selección tiene 20 ${term} (del 1 al 20). La sección FWC son las ${term} de presentación del torneo y CC son las de la Copa de Campeones.`
    },
    {
      q:`¿Puedo usar la app sin registrarme?`,
      a:`No en esta versión con Firebase. El registro es necesario para guardar tu álbum en la nube y poder intercambiar con otros usuarios. El proceso es rápido: solo necesitás una cuenta de Google o un email.`
    },
  ];

  let h=`<div style="background:var(--green);padding:13px;color:#fff;flex-shrink:0">

  </div>`;

  faqItems.forEach((item,i)=>{
    h+=`<div style="border-bottom:1px solid var(--gray-l)">
      <div onclick="toggleFaq(${i})" style="display:flex;align-items:center;justify-content:space-between;padding:14px;cursor:pointer;background:#fff;gap:10px">
        <span style="font-size:13px;font-weight:700;color:var(--text);flex:1;line-height:1.4">${item.q}</span>
        <span id="faq-chev-${i}" style="font-size:12px;color:var(--green);flex-shrink:0;transition:transform .3s">▼</span>

      <div id="faq-ans-${i}" style="display:none;padding:0 14px 14px;font-size:13px;color:var(--muted);line-height:1.6;background:#fff">${item.a}</div>
    </div>`;
  });

  h+=`<div style="padding:20px 14px;background:var(--bg)">
    <div style="background:#fff;border-radius:var(--r);padding:16px;text-align:center;box-shadow:0 1px 8px rgba(0,0,0,.07)">
      <div style="font-size:24px;margin-bottom:8px">💬</div>

      <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Escribinos en el chat de la comunidad o contactá a un coleccionista verificado.</div>
    </div>
    <div style="background:linear-gradient(135deg,#1a3a6b,#1a5fa8);border-radius:var(--r);padding:20px;text-align:center;margin-top:12px">
      <div style="font-size:32px;margin-bottom:8px">☕</div>
      <div style="font-family:'Anton',sans-serif;font-size:18px;color:#fff;letter-spacing:1px;margin-bottom:6px">¡ESTA APP ES GRATUITA!</div>
      <div style="font-size:12px;color:rgba(255,255,255,.8);margin-bottom:16px;line-height:1.6">Sin publicidad, sin costos ocultos.<br>Si te es útil, podés apoyar el proyecto con una donación voluntaria.</div>
      <button onclick="openDonate()" style="background:var(--gold);color:#1a3a6b;border:none;border-radius:10px;padding:12px 24px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;width:100%">
        💙 Donar por PayPal
      </button>
      <div style="font-size:10px;color:rgba(255,255,255,.5);margin-top:10px">Cualquier monto ayuda · paypal.me/intercambiaapp</div>
    </div>
  </div>
  <div style="height:80px"></div>`;

  tab.innerHTML=h;
}
window.toggleFaq=function(i){
  const ans=document.getElementById('faq-ans-'+i);
  const chev=document.getElementById('faq-chev-'+i);
  const open=ans.style.display==='block';
  ans.style.display=open?'none':'block';
  chev.style.transform=open?'':'rotate(180deg)';
};
