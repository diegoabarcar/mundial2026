<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a6b3a;--green-l:#2a8a4e;--green-d:#0f4024;
  --gold:#f5c518;--gold-d:#c9a500;
  --bg:#f0f4f1;--card:#fff;--gray:#8a9a8e;--gray-l:#e8ede9;
  --red:#e03535;--text:#1a2b1f;--muted:#5a7060;--nav:62px;--r:14px;
}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#app{max-width:480px;margin:0 auto;height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.15)}

/* LOGIN SCREEN */
.login-screen{flex:1;background:linear-gradient(160deg,var(--green-d) 0%,var(--green) 55%,#2ecc71 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;color:#fff;overflow-y:auto}
.login-trophy{font-size:72px;margin-bottom:14px;filter:drop-shadow(0 8px 20px rgba(0,0,0,.3))}
.login-title{font-family:'Anton',sans-serif;font-size:36px;letter-spacing:2px;line-height:1;margin-bottom:6px}
.login-sub{font-size:14px;opacity:.85;margin-bottom:32px;font-weight:600}
.login-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.social-btn{display:flex;align-items:center;gap:12px;background:#fff;color:#1a1a1a;border:none;border-radius:12px;padding:14px 18px;font-family:'Barlow',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;width:100%}
.social-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.15)}
.social-btn:active{transform:scale(.98)}
.social-btn .s-icon{width:24px;height:24px;flex-shrink:0}
.social-btn.google{background:#fff}
.social-btn.facebook{background:#1877f2;color:#fff}
.social-btn.apple{background:#000;color:#fff}
.social-btn.email{background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.3)}
.divider-line{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.5);font-size:12px;font-weight:600;margin:4px 0;width:100%;max-width:320px}
.divider-line::before,.divider-line::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.25)}

/* EMAIL FORM */
.email-form{background:#fff;border-radius:20px 20px 0 0;position:absolute;bottom:0;left:0;right:0;padding:20px;z-index:100;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.email-form-title{font-family:'Anton',sans-serif;font-size:20px;color:var(--green);margin-bottom:16px;text-align:center}
.form-group{margin-bottom:12px}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:5px;display:block}
.form-input{width:100%;border:1.5px solid var(--gray-l);border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;background:var(--bg);transition:border-color .2s}
.form-input:focus{border-color:var(--green);background:#fff}
.btn{border:none;border-radius:10px;padding:12px 18px;font-family:inherit;font-weight:700;cursor:pointer;font-size:14px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;min-height:44px;width:100%}
.btn-primary{background:var(--green);color:#fff}
.btn-secondary{background:var(--gray-l);color:var(--text)}
.btn-gold{background:var(--gold);color:var(--green-d)}
.btn-sm{padding:7px 11px;font-size:12px;min-height:36px;width:auto}
.btn-danger{background:#fde8e8;color:var(--red)}
.toggle-link{text-align:center;font-size:13px;color:var(--muted);margin-top:10px;cursor:pointer}
.toggle-link span{color:var(--green);font-weight:700}

/* PROFILE SETUP */
.profile-setup{flex:1;overflow-y:auto;background:var(--bg)}
.setup-hdr{background:var(--green);padding:14px 16px;color:#fff;display:flex;align-items:center;gap:8px}
.setup-title{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:1px}
.avatar-picker{display:flex;gap:8px;flex-wrap:wrap}
.av-opt{font-size:26px;cursor:pointer;padding:6px;border-radius:8px;border:2px solid transparent;transition:all .2s}
.av-opt.sel{border-color:var(--green);background:#e8f5ee}

/* APP SHELL */
.app-shell{flex:1;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:var(--green);color:#fff;padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-t{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:1px}
.hdr-s{font-size:10px;opacity:.75;font-weight:600}
.hdr-user{background:rgba(255,255,255,.15);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:var(--nav)}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:var(--gray-l);border-radius:3px}
.navbar{position:absolute;bottom:0;left:0;right:0;height:var(--nav);background:#fff;border-top:1px solid var(--gray-l);display:flex;box-shadow:0 -3px 16px rgba(0,0,0,.07)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;color:var(--gray);border:none;background:none;font-family:inherit;min-height:44px;transition:color .2s}
.ni.act{color:var(--green)}
.ni .ico{font-size:20px;transition:transform .2s}
.ni.act .ico{transform:scale(1.15)}
.ni .lbl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}

/* ALBUM */
.album-hdr{background:var(--green);padding:14px}
.prog-bar{background:rgba(255,255,255,.25);border-radius:100px;height:9px;overflow:hidden}
.prog-fill{background:linear-gradient(90deg,var(--gold),#fff);height:100%;border-radius:100px;transition:width .5s}
.filter-row{display:flex;gap:5px;overflow-x:auto;padding:10px 14px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.chip{background:#fff;border:1.5px solid var(--gray-l);border-radius:100px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;color:var(--muted);font-family:inherit}
.chip.act{background:var(--green);border-color:var(--green);color:#fff}
.search-box{margin:0 14px 7px;background:#fff;border-radius:9px;border:1.5px solid var(--gray-l);display:flex;align-items:center;padding:0 11px}
.search-box input{flex:1;border:none;outline:none;padding:9px 7px;font-size:13px;font-family:inherit;background:transparent}
.sec-hdr{display:flex;align-items:center;gap:7px;padding:9px 14px;background:var(--green-d);color:#fff;cursor:pointer;user-select:none}
.sec-name{font-family:'Anton',sans-serif;font-size:13px;letter-spacing:.5px;flex:1}
.sec-chev{font-size:11px;transition:transform .3s}
.sec-chev.open{transform:rotate(180deg)}
.sticker-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:10px;background:#fff}
.stk{aspect-ratio:2/3;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s;position:relative;border:2px solid transparent;user-select:none;min-height:44px}
.stk:active{transform:scale(.92)}
.stk.miss{background:var(--gray-l);border:2px dashed #c5d0c7}
.stk.have{background:linear-gradient(135deg,#e8f5ee,#d0eddb);border-color:var(--green)}
.stk.dbl{background:linear-gradient(135deg,#fff8e0,#ffeaa0);border-color:var(--gold-d)}
.stk-n{font-family:'Anton',sans-serif;font-size:12px;color:var(--muted)}
.stk.have .stk-n,.stk.have .stk-ico{color:var(--green-d)}
.stk.dbl .stk-n,.stk.dbl .stk-ico{color:var(--gold-d)}
.stk-ico{font-size:13px}
.stk-c{font-size:8px;font-weight:700;background:var(--gold);color:var(--green-d);border-radius:100px;padding:1px 4px;position:absolute;top:2px;right:2px}
@keyframes pop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .22s ease forwards}

/* POSTS */
.post-card{background:#fff;border-radius:var(--r);margin:7px 14px;padding:13px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--gray-l);flex-shrink:0;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.pills{display:flex;flex-wrap:wrap;gap:3px}
.pill{background:var(--gray-l);border-radius:5px;padding:2px 6px;font-size:10px;font-weight:700;color:var(--muted)}
.pill.off{background:#e8f5ee;color:var(--green-d)}
.pill.wnt{background:#fff3cd;color:#856404}
.stars{display:inline-flex;gap:2px}
.star{font-size:11px;color:var(--gray-l)}
.star.f{color:var(--gold)}

/* MATCHES */
.match-card{background:#fff;border-radius:var(--r);margin:7px 14px;padding:13px;box-shadow:0 2px 10px rgba(0,0,0,.08);position:relative;overflow:hidden}
.match-card.perf::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--green))}
.m-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,var(--gold),#f7d060);color:var(--green-d);border-radius:100px;padding:3px 9px;font-size:10px;font-weight:700;margin-bottom:7px}
.m-nums{display:flex;gap:10px;margin:9px 0}
.m-box{flex:1;background:var(--bg);border-radius:9px;padding:9px;text-align:center}
.m-num{font-family:'Anton',sans-serif;font-size:26px}
.m-num.g{color:var(--green)}
.m-num.au{color:var(--gold-d)}

/* CHAT */
.chat-item{display:flex;align-items:center;gap:11px;padding:11px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--gray-l)}
.chat-item:hover{background:var(--bg)}
.chat-view{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;z-index:50}
.cv-hdr{display:flex;align-items:center;gap:9px;padding:11px 14px;background:#fff;border-bottom:1px solid var(--gray-l);flex-shrink:0}
.cv-msgs{flex:1;overflow-y:auto;padding:11px 14px;display:flex;flex-direction:column;gap:7px}
.bubble{max-width:78%;padding:9px 13px;border-radius:13px;font-size:12px;line-height:1.4}
.bubble.mine{background:var(--green);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.bubble.theirs{background:#fff;color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.prop-bubble{background:#fff;border-radius:13px;padding:11px;box-shadow:0 1px 8px rgba(0,0,0,.1);max-width:83%;border:2px solid var(--green)}
.prop-title{font-weight:700;font-size:12px;color:var(--green);margin-bottom:7px}
.prop-row{display:flex;gap:7px;margin-bottom:7px}
.prop-col{flex:1;background:var(--bg);border-radius:7px;padding:7px}
.pstatus{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700}
.s-pend{background:#fff3cd;color:#856404}
.s-acc{background:#e8f5ee;color:var(--green-d)}
.s-comp{background:var(--green);color:#fff}
.s-rej{background:#fde8e8;color:var(--red)}
.cv-inp{display:flex;gap:7px;padding:9px 14px;background:#fff;border-top:1px solid var(--gray-l);flex-shrink:0}
.c-input{flex:1;border:1.5px solid var(--gray-l);border-radius:22px;padding:9px 14px;font-size:13px;font-family:inherit;outline:none}
.c-input:focus{border-color:var(--green)}
.send-btn{background:var(--green);color:#fff;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prop-btn{background:var(--gold);color:var(--green-d);border:none;border-radius:9px;padding:7px 12px;font-family:inherit;font-weight:700;font-size:11px;cursor:pointer}

/* MODAL */
.modal-ov{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end}
.modal{background:#fff;border-radius:18px 18px 0 0;width:100%;max-height:85%;display:flex;flex-direction:column;animation:slideUp .3s ease}
.modal-handle{width:36px;height:4px;background:var(--gray-l);border-radius:100px;margin:10px auto 0}
.modal-hdr{padding:14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-l)}
.modal-title{font-family:'Anton',sans-serif;font-size:17px;color:var(--green)}
.modal-close{background:var(--gray-l);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:15px}
.modal-body{padding:14px;overflow-y:auto;flex:1}
.modal-ft{padding:14px;border-top:1px solid var(--gray-l);display:flex;gap:7px}

/* PROFILE */
.prof-hero{background:linear-gradient(135deg,var(--green-d),var(--green));color:#fff;padding:22px 18px;text-align:center}
.badge-row{display:flex;flex-wrap:wrap;gap:7px;padding:14px}
.badge{background:var(--bg);border-radius:9px;padding:7px 11px;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--muted)}
.badge.earned{background:linear-gradient(135deg,#fff8e0,#ffeaa0);color:var(--green-d)}

/* TOAST */
.toast-c{position:absolute;top:75px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:6px;pointer-events:none;width:88%;max-width:420px}
.toast{background:var(--green-d);color:#fff;border-radius:9px;padding:10px 14px;font-size:12px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:toastIn .3s ease}
@keyframes toastIn{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.gold{background:var(--gold);color:var(--green-d)}
.toast.err{background:var(--red)}

.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty .ei{font-size:48px;margin-bottom:10px}
.fab{position:absolute;bottom:calc(var(--nav) + 14px);right:14px;width:50px;height:50px;border-radius:50%;background:var(--gold);color:var(--green-d);border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;z-index:10;transition:transform .2s}
.fab:hover{transform:scale(1.08)}
.loading-screen{flex:1;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--green-d),var(--green));color:#fff;font-family:'Anton',sans-serif;font-size:32px;flex-direction:column;gap:16px}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.rating-star{font-size:26px;cursor:pointer;color:var(--gray-l)}
.plabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
</style>
</head>
<body>
<div id="app">
  <div class="toast-c" id="toastC"></div>

  <!-- LOADING -->
  <div id="scr-loading" class="loading-screen">
    <span>⚽</span>
    <div class="spinner"></div>
  </div>

  <!-- LOGIN -->
  <div id="scr-login" class="login-screen" style="display:none">
    <div class="login-trophy">🏆</div>
    <div class="login-title">MUNDIAL<br>2026</div>
    <div class="login-sub">Álbum de Láminas · Intercambios</div>
    <div class="login-btns">
      <!-- Google -->
      <button class="social-btn google" onclick="loginGoogle()">
        <svg class="s-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuar con Google
      </button>
      <!-- Facebook -->
      <button class="social-btn facebook" onclick="loginFacebook()">
        <svg class="s-icon" viewBox="0 0 24 24" fill="#fff"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Continuar con Facebook
      </button>
      <!-- Apple -->
      <button class="social-btn apple" onclick="loginApple()">
        <svg class="s-icon" viewBox="0 0 24 24" fill="#fff"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Continuar con Apple
      </button>
      <div class="divider-line">o</div>
      <!-- Email -->
      <button class="social-btn email" onclick="showEmailForm()">
        <span style="font-size:22px">✉️</span>
        Continuar con Email
      </button>
    </div>
  </div>

  <!-- EMAIL FORM OVERLAY -->
  <div id="email-form-overlay" style="display:none;position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:200">
    <div class="email-form" id="email-form">
      <button onclick="hideEmailForm()" style="position:absolute;top:14px;right:14px;background:var(--gray-l);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px">×</button>
      <div class="email-form-title" id="email-form-title">Iniciar sesión</div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="ef-email" type="email" placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input class="form-input" id="ef-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitEmail()">
      </div>
      <div class="form-group" id="ef-name-group" style="display:none">
        <label class="form-label">Nombre</label>
        <input class="form-input" id="ef-name" placeholder="Tu nombre completo">
      </div>
      <button class="btn btn-primary" onclick="submitEmail()" id="ef-submit">Entrar</button>
      <div class="toggle-link" id="ef-toggle" onclick="toggleEmailMode()">¿No tenés cuenta? <span>Registrarte</span></div>
    </div>
  </div>

  <!-- PROFILE SETUP (primera vez) -->
  <div id="scr-setup" style="display:none;flex:1;flex-direction:column">
    <div class="setup-hdr">
      <div class="setup-title">COMPLETÁ TU PERFIL</div>
    </div>
    <div style="padding:16px;overflow-y:auto">
      <div class="form-group">
        <label class="form-label">Alias de coleccionista</label>
        <input class="form-input" id="s-alias" placeholder="¿Cómo te conocen?">
      </div>
      <div class="form-group">
        <label class="form-label">Ciudad / Región</label>
        <select class="form-input" id="s-city">

function genCode(){return 'COL-'+Math.floor(1000+Math.random()*9000);}
function genId(){return Math.random().toString(36).slice(2,10);}
function nowTs(){return Date.now();}
function timeAgo(ts){
  const d=(nowTs()-ts)/1000;
  if(d<60)return'hace un momento';
  if(d<3600)return`hace ${Math.floor(d/60)} min`;
  if(d<86400)return`hace ${Math.floor(d/3600)} h`;
  return`hace ${Math.floor(d/86400)} d`;
}
function getAlbumStats(album={}){
  let have=0,doubles=0,missing=0;
  for(let i=1;i<=TOTAL;i++){const s=album[i];if(!s||s.state==='missing')missing++;else if(s.state==='have')have++;else{have++;doubles++;}}
  return{have,doubles,missing};
}
function getUserRating(u){if(!u?.ratings?.length)return 0;return u.ratings.reduce((a,b)=>a+b,0)/u.ratings.length;}
function starsHtml(rating,count){
  const r=Math.round(rating);
  let h='<span class="stars">';
  for(let i=1;i<=5;i++)h+=`<span class="star ${i<=r?'f':''}">★</span>`;
  h+='</span>';
  if(count!==undefined)h+=`<span style="font-size:10px;color:var(--muted);margin-left:2px">(${count})</span>`;
  return h;
}
function getDoublesList(album={}){return Object.entries(album).filter(([,v])=>v.state==='double').map(([k])=>+k);}
function getMissingList(album={}){const m=[];for(let i=1;i<=TOTAL;i++)if(!album[i]||album[i].state==='missing')m.push(i);return m;}
function pillsHtml(nums=[],cls,max=14){
  if(!nums.length)return'<span style="font-size:11px;color:var(--muted)">—</span>';
  let h=nums.slice(0,max).map(n=>`<span class="pill ${cls}">#${n}</span>`).join('');
  if(nums.length>max)h+=`<span class="pill">+${nums.length-max}</span>`;
  return`<div class="pills">${h}</div>`;
}
function avHtml(u,size=40){
  const fs=Math.floor(size*0.5);
  if(u?.photoURL)return`<div class="av" style="width:${size}px;height:${size}px"><img src="${u.photoURL}" alt=""></div>`;
  return`<div class="av" style="width:${size}px;height:${size}px;font-size:${fs}px">${u?.avatar||'👤'}</div>`;
}

function toast(msg,type=''){
  const c=document.getElementById('toastC');
  const el=document.createElement('div');

  c.appendChild(el);setTimeout(()=>el.remove(),3200);
}

function hide(id){document.getElementById(id).style.display='none';}

// FIRESTORE HELPERS
// ============================================================
async function saveAlbum(album){
  if(!currentUser)return;
  await updateDoc(doc(db,'users',currentUser.uid),{album});
}
async function loadAllUsers(){
  const snap=await getDocs(collection(db,'users'));
  allUsers=snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function loadPosts(){
  const snap=await getDocs(query(collection(db,'posts'),orderBy('createdAt','desc')));
  posts=snap.docs.map(d=>({id:d.id,...d.data(),createdAt:d.data().createdAt?.toMillis?.()??nowTs()}));
}
async function loadConversations(){
  if(!currentUser)return;
  const snap=await getDocs(query(collection(db,'conversations'),where('participants','array-contains',currentUser.uid)));
  conversations=snap.docs.map(d=>({id:d.id,...d.data(),updatedAt:d.data().updatedAt?.toMillis?.()??nowTs()}));
}

// AUTH
// ============================================================
onAuthStateChanged(auth,async user=>{
  hide('scr-loading');
  if(user){
    currentUser=user;
    const ref=doc(db,'users',user.uid);
    const snap=await getDoc(ref);
    if(!snap.exists()){
      // Nuevo usuario → setup de perfil
      showSetup();
    } else {
      userProfile={id:user.uid,...snap.data()};
      await loadAllUsers();await loadPosts();await loadConversations();
      showApp();
    }
  } else {
    currentUser=null;userProfile=null;
    show('scr-login');
    document.getElementById('scr-login').style.flexDirection='column';
  }
});

window.submitEmail=async function(){
  const email=document.getElementById('ef-email').value.trim();
  const pass=document.getElementById('ef-pass').value;
  const name=document.getElementById('ef-name').value.trim();
  if(!email||!pass){toast('Completá email y contraseña');return;}
  try{
    if(emailMode==='register'){
      if(!name){toast('Escribí tu nombre');return;}
      const cred=await createUserWithEmailAndPassword(auth,email,pass);
      await updateProfile(cred.user,{displayName:name});
    } else {
      await signInWithEmailAndPassword(auth,email,pass);
    }
    hideEmailForm();
  }catch(e){
    const msgs={'auth/email-already-in-use':'Ese email ya está registrado.','auth/wrong-password':'Contraseña incorrecta.','auth/user-not-found':'Usuario no encontrado.','auth/weak-password':'La contraseña debe tener al menos 6 caracteres.'};

window.saveProfile=async function(){

window.setTab=function(tab){

  if(tab==='album')renderAlbum();
  else if(tab==='tablon')renderTablon();
  else if(tab==='matches')renderMatches();
  else if(tab==='messages')renderMessages();
  else if(tab==='profile')renderProfile();
};

// ============================================================
// ALBUM
// ============================================================
async function toggleSticker(num){
  if(!currentUser||!userProfile)return;
  const album=userProfile.album||{};
  const cur=album[num];
  if(!cur||cur.state==='missing')album[num]={state:'have'};
  else if(cur.state==='have')album[num]={state:'double',count:2};
  else album[num]={state:'missing'};
  userProfile.album=album;
  await saveAlbum(album);
  renderAlbum();
}

function renderAlbum(){
  const album=userProfile?.album||{};
  const stats=getAlbumStats(album);
  const pct=Math.round(stats.have/TOTAL*100);
  const tab=document.getElementById('tab-album');
  let h=`<div class="album-hdr">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
      <span style="font-family:'Anton',sans-serif;font-size:22px;color:#fff;letter-spacing:1px">${pct}% COMPLETADO</span>
      <span style="font-size:12px;color:rgba(255,255,255,.75)">${stats.have}/${TOTAL}</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div style="display:flex;gap:14px;margin-top:10px">
      <div style="text-align:center"><div style="font-family:'Anton',sans-serif;font-size:20px;color:#fff">${stats.have}</div><div style="font-size:10px;color:rgba(255,255,255,.6);font-weight:700">Tengo</div></div>
      <div style="text-align:center"><div style="font-family:'Anton',sans-serif;font-size:20px;color:var(--gold)">${stats.doubles}</div><div style="font-size:10px;color:rgba(255,255,255,.6);font-weight:700">Dobles</div></div>
      <div style="text-align:center"><div style="font-family:'Anton',sans-serif;font-size:20px;color:#ff9999">${stats.missing}</div><div style="font-size:10px;color:rgba(255,255,255,.6);font-weight:700">Faltan</div></div>
    </div>
  </div>
  <div class="filter-row">
    <button class="chip ${albumFilter==='all'?'act':''}" onclick="setAlbumFilter('all')">Todas</button>
    <button class="chip ${albumFilter==='missing'?'act':''}" onclick="setAlbumFilter('missing')">Solo faltan</button>
    <button class="chip ${albumFilter==='double'?'act':''}" onclick="setAlbumFilter('double')">Dobles</button>
    <button class="chip ${albumFilter==='have'?'act':''}" onclick="setAlbumFilter('have')">Tengo</button>
  </div>
  <div class="search-box">
    <span>🔍</span>
    <input id="album-search" placeholder="Buscar por número o selección..." value="${albumSearch}" oninput="setAlbumSearch(this.value)">
    ${albumSearch?`<button onclick="setAlbumSearch('')" style="background:none;border:none;cursor:pointer;color:var(--gray);font-size:16px">×</button>`:''}
  </div>`;

  SECTIONS.forEach(sec=>{
    const range=sec.range;
    let stickers=[];
    for(let n=range[0];n<=range[1];n++){
      const st=album[n];const state=st?st.state:'missing';
      if(albumFilter==='have'&&state==='missing')continue;
      if(albumFilter==='double'&&state!=='double')continue;
      if(albumFilter==='missing'&&state!=='missing')continue;
      if(albumSearch&&!String(n).includes(albumSearch)&&!sec.name.toLowerCase().includes(albumSearch.toLowerCase()))continue;
      stickers.push({n,state,count:st?.count||0});
    }
    if(!stickers.length&&(albumFilter!=='all'||albumSearch))return;
    const total=range[1]-range[0]+1;
    const haveC=Array.from({length:total},(_,i)=>range[0]+i).filter(n=>album[n]&&album[n].state!=='missing').length;
    const isOpen=openSections[sec.id]||(albumFilter!=='all')||albumSearch;
    h+=`<div style="margin-bottom:6px">
      <div class="sec-hdr" onclick="toggleSection('${sec.id}')">
        <span style="font-size:18px">${sec.flag}</span>
        <span class="sec-name">${sec.name}</span>
        <span style="font-size:10px;opacity:.8;font-weight:600">${haveC}/${total}</span>
        <span class="sec-chev ${isOpen?'open':''}">▼</span>
      </div>`;
    if(isOpen&&stickers.length){
      h+=`<div class="sticker-grid">`;
      stickers.forEach(({n,state,count})=>{
        h+=`<div class="stk ${state}" onclick="stickerClick(${n},this)">
          <span class="stk-n">${n}</span>
          ${state==='have'?'<span class="stk-ico">✓</span>':''}
          ${state==='double'?`<span class="stk-ico">★</span>${count>1?`<span class="stk-c">×${count}</span>`:''}`:''} 
        </div>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  tab.innerHTML=h;
}

window.stickerClick=function(n,el){
  el.classList.add('pop');setTimeout(()=>el.classList.remove('pop'),300);
  toggleSticker(n);
};
window.toggleSection=function(id){openSections[id]=!openSections[id];renderAlbum();};
window.setAlbumFilter=function(f){albumFilter=f;renderAlbum();};
window.setAlbumSearch=function(v){albumSearch=v;renderAlbum();};

async function renderTablon(){
  await loadPosts();
  const tab=document.getElementById('tab-tablon');
  const cities=['all',...new Set(allUsers.map(u=>u.city))];

async function renderMatches(){
  await loadAllUsers();
  const tab=document.getElementById('tab-matches');
  const myAlbum=userProfile?.album||{};
  const myDoubles=getDoublesList(myAlbum);
  const myMissing=getMissingList(myAlbum);
  const matches=allUsers.filter(u=>u.id!==currentUser?.uid).map(other=>{
    const oa=other.album||{};
    const od=getDoublesList(oa);const om=getMissingList(oa);
    const canGive=myDoubles.filter(n=>om.includes(n)).length;
    const canReceive=od.filter(n=>myMissing.includes(n)).length;
    const score=Math.min(canGive,canReceive);
    return{user:other,canGive,canReceive,score,perfect:Math.abs(canGive-canReceive)<=1&&score>=1};
  }).filter(m=>m.score>0).sort((a,b)=>b.score-a.score);
  let h=`<div style="background:var(--green);padding:13px;color:#fff">
    <div style="font-family:'Anton',sans-serif;font-size:18px;letter-spacing:1px">MIS MATCHES</div>
    <div style="font-size:11px;opacity:.8;margin-top:2px">${matches.length} coleccionistas compatibles</div>
  </div>`;
  if(!matches.length){tab.innerHTML=h+`<div class="empty"><div class="ei">🔍</div><p>No hay matches aún. Marcá láminas en tu álbum para encontrar coincidencias.</p></div>`;return;}
  matches.forEach(({user:other,canGive,canReceive,perfect})=>{
    const rating=getUserRating(other);
    h+=`<div class="match-card ${perfect?'perf':''}">
      ${perfect?`<div class="m-badge">✦ Match Perfecto</div>`:''}
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:9px">
        ${avHtml(other)}<div>
          <div style="font-weight:700;font-size:14px">${other.alias}</div>
          <div style="font-size:11px;color:var(--muted);display:flex;gap:8px"><span>📍 ${other.city}</span>${starsHtml(rating)}</div>
        </div>
      </div>
      <div class="m-nums">
        <div class="m-box"><div class="m-num g">${canGive}</div><div style="font-size:9px;color:var(--muted);font-weight:600">Puedo darle</div></div>
        <div style="display:flex;align-items:center;color:var(--muted);font-size:18px">⇄</div>
        <div class="m-box"><div class="m-num au">${canReceive}</div><div style="font-size:9px;color:var(--muted);font-weight:600">Me puede dar</div></div>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="openChatWith('${other.id}')">💬 Iniciar intercambio</button>
    </div>`;
  });
  tab.innerHTML=h;
}

window.openChatWith=async function(userId){
  let conv=conversations.find(c=>c.participants.includes(currentUser.uid)&&c.participants.includes(userId));
  if(!conv){
    const ref=await addDoc(collection(db,'conversations'),{
      participants:[currentUser.uid,userId],messages:[],
      lastMessage:'',updatedAt:serverTimestamp()
    });
    conv={id:ref.id,participants:[currentUser.uid,userId],messages:[],updatedAt:nowTs()};

window.openChat=async function(convId){

  if(!conv)return;

  const other=allUsers.find(u=>u.id===otherId)||{alias:'Usuario',city:'',avatar:'👤'};

  // Cargar mensajes desde Firestore
  const msgsSnap=await getDocs(query(collection(db,'conversations',convId,'messages'),orderBy('createdAt','asc')));
  const msgs=msgsSnap.docs.map(d=>({id:d.id,...d.data(),ts:d.data().createdAt?.toMillis?.()??nowTs()}));

  const overlay=document.getElementById('chat-overlay');

  overlay.innerHTML=`<div class="chat-view">
    <div class="cv-hdr">

      ${avHtml(other,34)}
      <div style="flex:1">
        <div style="font-weight:700;font-size:13px">${other.alias}</div>
        <div style="font-size:10px;color:var(--muted)">📍 ${other.city}</div>
      </div>

function renderMsgList(msgs){
  let h='';
  msgs.forEach(msg=>{
    const mine=msg.from===currentUser?.uid;
    if(msg.type==='proposal'){
      h+=renderProposalBubble(msg,mine);
    } else {
      h+=`<div style="display:flex;flex-direction:column;align-items:${mine?'flex-end':'flex-start'}">
        <div class="bubble ${mine?'mine':'theirs'}">${msg.text}</div>
        <div style="font-size:9px;opacity:.55;margin-top:3px;text-align:${mine?'right':'left'}">${timeAgo(msg.ts)}</div>
      </div>`;
    }
  });
  return h;
}

function renderProposalBubble(msg,mine){
  const sc={pending:'s-pend',accepted:'s-acc',completed:'s-comp',rejected:'s-rej'}[msg.status]||'s-pend';
  const sl={pending:'⏳ Pendiente',accepted:'✅ Aceptada',completed:'🏆 Completada',rejected:'❌ Rechazada'}[msg.status];
  let actBtns='';
  if(msg.status==='pending'&&!mine)actBtns=`<div style="display:flex;gap:5px">
    <button class="btn btn-sm" style="background:#e8f5ee;color:var(--green-d);min-height:30px" onclick="proposalAction('${msg.convId}','${msg.id}','accept')">✓</button>
    <button class="btn btn-sm btn-danger" style="min-height:30px" onclick="proposalAction('${msg.convId}','${msg.id}','reject')">✕</button>
  </div>`;
  if(msg.status==='accepted'&&mine)actBtns=`<button class="btn btn-sm btn-gold" style="min-height:30px" onclick="proposalAction('${msg.convId}','${msg.id}','complete')">🏆 Completar</button>`;
  return`<div class="prop-bubble" style="align-self:${mine?'flex-end':'flex-start'}">
    <div class="prop-title">📋 Propuesta de intercambio</div>
    <div class="prop-row">
      <div class="prop-col"><div style="font-size:9px;font-weight:700;color:var(--muted);margin-bottom:3px">Entrego</div>${pillsHtml(msg.give||[],'off',6)}</div>
      <div class="prop-col"><div style="font-size:9px;font-weight:700;color:var(--muted);margin-bottom:3px">Recibo</div>${pillsHtml(msg.receive||[],'wnt',6)}</div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px">
      <span class="pstatus ${sc}">${sl}</span>${actBtns}
    </div>
  </div>`;
}

window.sendMsg=async function(convId){
  const inp=document.getElementById('ci');
  if(!inp?.value.trim())return;
  const text=inp.value.trim();inp.value='';
  const msgRef=await addDoc(collection(db,'conversations',convId,'messages'),{
    from:currentUser.uid,text,createdAt:serverTimestamp()
  });
  await updateDoc(doc(db,'conversations',convId),{lastMessage:text,updatedAt:serverTimestamp()});
  const conv=conversations.find(c=>c.id===convId);
  if(conv){
    const msg={id:msgRef.id,from:currentUser.uid,text,ts:nowTs()};
    conv.messages=[...(conv.messages||[]),msg];
    const msgs=document.getElementById('cv-msgs');
    if(msgs){msgs.innerHTML=renderMsgList(conv.messages);msgs.scrollTop=msgs.scrollHeight;}
  }
};

window.proposalAction=async function(convId,msgId,action){
  const statusMap={accept:'accepted',reject:'rejected',complete:'completed'};
  await updateDoc(doc(db,'conversations',convId,'messages',msgId),{status:statusMap[action]});
  if(action==='complete'){
    // Actualizar álbumes
    const msgSnap=await getDoc(doc(db,'conversations',convId,'messages',msgId));
    const msg=msgSnap.data();
    const conv=conversations.find(c=>c.id===convId);
    const otherId=conv?.participants.find(id=>id!==currentUser.uid);
    const otherSnap=await getDoc(doc(db,'users',otherId));
    const otherData=otherSnap.data()||{};
    const myAlbum={...userProfile.album||{}};
    const otherAlbum={...otherData.album||{}};
    (msg.give||[]).forEach(n=>{
      const s=myAlbum[n];
      if(s?.state==='double'&&(s.count||2)>2)myAlbum[n]={...s,count:s.count-1};
      else if(s?.state==='double')myAlbum[n]={state:'have'};
      otherAlbum[n]={state:'have'};
    });
    (msg.receive||[]).forEach(n=>{
      const s=otherAlbum[n];
      if(s?.state==='double'&&(s.count||2)>2)otherAlbum[n]={...s,count:s.count-1};
      else if(s?.state==='double')otherAlbum[n]={state:'have'};
      myAlbum[n]={state:'have'};
    });
    await updateDoc(doc(db,'users',currentUser.uid),{album:myAlbum});
    await updateDoc(doc(db,'users',otherId),{album:otherAlbum});
    userProfile.album=myAlbum;
    toast('🏆 ¡Intercambio completado! Los álbumes se actualizaron.');
    showRateModal(otherId);
  } else {
    const labels={accept:'✅ Propuesta aceptada',reject:'❌ Propuesta rechazada'};
    toast(labels[action]||'');
  }
  // Recargar chat
  const conv=conversations.find(c=>c.id===convId);
  if(conv){const m=conv.messages.find(x=>x.id===msgId);if(m)m.status=statusMap[action];}
  const msgs=document.getElementById('cv-msgs');
  const conv2=conversations.find(c=>c.id===convId);
  if(msgs&&conv2)msgs.innerHTML=renderMsgList(conv2.messages);
};

}

      </div>
    </div>
    <div style="padding:10px 14px 4px;font-weight:700;font-size:12px">Logros</div>
    <div class="badge-row">${badges.map(b=>`<div class="badge ${b.earned?'earned':''}" style="opacity:${b.earned?1:.45}">
      <span style="font-size:17px">${b.icon}</span>
      <div><div style="font-size:11px;font-weight:700">${b.name}</div><div style="font-size:10px;opacity:.75">${b.desc}</div></div>
    </div>`).join('')}</div>
    <div style="padding:20px 14px 32px;display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-secondary" onclick="doSignOut()">🚪 Cerrar sesión</button>
    </div>`;
}

window.copyCode=function(code){
  try{navigator.clipboard.writeText(code);}catch(e){}
  toast('✅ Código copiado: '+code);
};

window.doSignOut=async function(){
  await signOut(auth);
  currentUser=null;userProfile=null;allUsers=[];posts=[];conversations=[];
  document.getElementById('scr-app').style.display='none';
  const ls=document.getElementById('scr-login');
  ls.style.display='flex';ls.style.flexDirection='column';
};

// ============================================================
// MODAL
// ============================================================
function showModal(title,body,onConfirm,confirmLabel='Confirmar'){
  const ov=document.getElementById('modal-ov');
  ov.style.display='flex';
  ov.innerHTML=`<div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <div class="modal-title">${title}</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">${body}</div>
    <div class="modal-ft">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="flex:1" id="modal-confirm">${confirmLabel}</button>
    </div>
  </div>`;
  document.getElementById('modal-confirm').onclick=onConfirm;
  ov.onclick=e=>{if(e.target===ov)closeModal();};
}
function closeModal(){const ov=document.getElementById('modal-ov');ov.style.display='none';ov.innerHTML='';}
window.closeModal=closeModal;
window.showModal=showModal;

</script>
</body>
</html>
